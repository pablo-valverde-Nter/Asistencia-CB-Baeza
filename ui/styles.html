<style>
/* ══════════════════════════════════════════════
   CB Baeza — Asistencia · Estilos
   Paleta: #4A148C morado · #FFFFFF blanco
   ══════════════════════════════════════════════ */
:root {
  --morado:       #4A148C;
  --morado-m:     #7B1FA2;
  --morado-s:     #F3E5F5;
  --morado-xs:    #FAF0FF;
  --blanco:       #FFFFFF;
  --fondo:        #F7F7F8;
  --texto:        #1A1A1A;
  --texto-sec:    #6B6B6B;
  --borde:        #E5E5E5;
  --verde:        #2E7D32;
  --verde-s:      #E8F5E9;
  --rojo:         #C62828;
  --rojo-s:       #FFEBEE;
  --naranja:      #E65100;
  --naranja-s:    #FFF3E0;
  --r:      10px;
  --r-lg:   18px;
  --nav-h:  68px;
  --hdr-h:  56px;
  --sombra: 0 2px 8px rgba(74,20,140,.09);
  --sombra-lg: 0 4px 20px rgba(74,20,140,.18);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--fondo); color: var(--texto);
  -webkit-tap-highlight-color: transparent;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, select, textarea { font-family: inherit; }

/* ── Layout ── */
#app {
  display: flex; flex-direction: column; height: 100%;
  max-width: 480px; margin: 0 auto; background: var(--blanco);
  position: relative; overflow: hidden;
}
#view-container {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: var(--nav-h);
}
.view { display: none; }
.view.active { display: block; }

/* ── Header ── */
#app-header {
  height: var(--hdr-h); background: var(--morado); color: var(--blanco);
  display: flex; align-items: center; padding: 0 16px; gap: 10px;
  flex-shrink: 0; z-index: 100;
}
#btn-back {
  display: none; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 50%; color: var(--blanco);
  font-size: 1.4rem; line-height: 1; transition: background .15s; flex-shrink: 0;
}
#btn-back.visible { display: flex; }
#btn-back:active { background: rgba(255,255,255,.18); }
#header-title { flex: 1; font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#user-badge {
  font-size: .7rem; background: rgba(255,255,255,.18); padding: 3px 9px;
  border-radius: 20px; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
#sync-badge {
  display: none; font-size: 1rem; color: rgba(255,255,255,.75); flex-shrink: 0;
  animation: spin .8s linear infinite; width: 22px; text-align: center;
}
#sync-badge.syncing { display: inline-block; }

/* ── Nav inferior ── */
#bottom-nav {
  height: var(--nav-h); background: linear-gradient(to right, #4A148C, #7B1FA2);
  display: flex; flex-shrink: 0; z-index: 100;
}
.nav-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; color: rgba(255,255,255,.55);
  font-size: .68rem; font-weight: 600; transition: color .2s; padding: 6px 0;
}
.nav-tab .nav-icon { font-size: 1.35rem; }
.nav-tab.active { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,.5); }
.nav-indicator {
  width: 24px; height: 3px; background: #fff; border-radius: 2px; margin-top: 3px;
  opacity: 0; transition: opacity .2s;
}
.nav-tab.active .nav-indicator { opacity: 1; }

/* ── FAB ── */
#fab-btn {
  position: absolute; bottom: calc(var(--nav-h) + 16px); right: 16px;
  width: 50px; height: 50px; border-radius: 50%;
  background: var(--morado); color: var(--blanco);
  font-size: 1.6rem; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--sombra-lg); z-index: 99; transition: transform .12s;
}
#fab-btn:active { transform: scale(.92); }
#fab-btn.hidden { display: none; }

/* ── Botones ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 22px; border-radius: 24px; font-size: .88rem; font-weight: 600;
  transition: opacity .15s, transform .1s; white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn-primary   { background: var(--morado); color: var(--blanco); }
.btn-secondary { background: var(--morado-s); color: var(--morado); }
.btn-danger    { background: var(--rojo-s); color: var(--rojo); }
.btn-full      { width: 100%; }
.btn-sm        { padding: 7px 14px; font-size: .8rem; }
.btn-icon {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  background: var(--morado-s); color: var(--morado);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; font-weight: 700;
}

/* ── Equipo cards (tab Equipos) ── */
.equipo-card {
  display: flex; align-items: center; gap: 14px;
  margin: 8px 16px; padding: 16px;
  background: var(--blanco); border-radius: var(--r); box-shadow: var(--sombra-lg);
  border-left: 5px solid var(--morado); cursor: pointer; transition: transform .12s;
}
.equipo-card:active { transform: scale(.98); background: linear-gradient(135deg, #FAF0FF 0%, #fff 100%); }
.equipo-card .eq-icon {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--morado-s); display: flex; align-items: center;
  justify-content: center; font-size: 1.2rem; flex-shrink: 0;
}
.equipo-card .eq-nombre { font-size: .95rem; font-weight: 700; }
.equipo-card .eq-meta   { font-size: .74rem; color: var(--texto-sec); margin-top: 2px; }
.equipo-card .eq-arrow  { margin-left: auto; color: var(--morado-m); font-size: 1rem; }

/* ── Cabecera coloreada (equipo/sesion) ── */
.vista-header {
  background: var(--morado); color: var(--blanco);
  padding: 16px; margin-bottom: 0;
}
.vista-header h2    { font-size: 1rem; font-weight: 700; }
.vista-header .vh-sub     { font-size: .8rem; opacity: .8; margin-top: 3px; }
.vista-header .vh-horario { font-size: .75rem; opacity: .7; margin-top: 5px; }

/* ── Sesion card ── */
.sesion-card {
  position: relative; display: flex; align-items: center; gap: 14px;
  padding: 13px 16px; border-bottom: 1px solid var(--borde);
  cursor: pointer; transition: background .1s;
}
.sesion-card.sin-registrar { border-left: 3px solid var(--rojo); }
.sesion-card:active { background: var(--morado-xs); }
.sesion-card:last-child { border-bottom: none; }
.sc-fecha {
  width: 44px; text-align: center; flex-shrink: 0;
  background: var(--morado-s); border-radius: 8px; padding: 5px 0;
}
.sc-fecha .dia { font-size: 1.15rem; font-weight: 800; color: var(--morado); line-height: 1; }
.sc-fecha .mes { font-size: .63rem; text-transform: uppercase; color: var(--morado-m); letter-spacing: .4px; }
.sc-info .dia-n { font-size: .88rem; font-weight: 600; }
.sc-info .hora  { font-size: .76rem; color: var(--texto-sec); }
.badge-extra {
  margin-left: auto; font-size: .64rem; background: var(--morado-s);
  color: var(--morado); padding: 2px 8px; border-radius: 10px; font-weight: 700;
}

/* ── Section header ── */
.section-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 6px;
}
.section-label {
  font-size: .75rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .7px; color: var(--texto-sec);
}

/* ── Asistencia: jugador card ── */
.jug-card {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-bottom: 1px solid var(--borde);
  cursor: pointer; user-select: none; transition: all 0.2s ease;
}
.jug-card:last-child { border-bottom: none; }
.jug-dorsal {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--borde); color: var(--texto-sec);
  display: flex; align-items: center; justify-content: center;
  font-size: .78rem; font-weight: 700; flex-shrink: 0;
  transition: background .15s, color .15s;
}
.jug-nombre { font-size: .88rem; font-weight: 600; }
.jug-tipo   { font-size: .7rem; color: var(--texto-sec); }
.jug-justif-aviso { font-size: .68rem; color: #E65100; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.estado-chip {
  margin-left: auto; width: 36px; height: 36px; border-radius: 50%;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: .85rem; font-weight: 700;
  background: var(--borde); color: var(--texto-sec);
  transition: background .15s, color .15s;
}
.jug-card.P { background: var(--verde-s); }
.jug-card.P .jug-dorsal  { background: var(--verde); color: #fff; }
.jug-card.P .estado-chip  { background: var(--verde); color: #fff; }
.jug-card.A { background: var(--rojo-s); }
.jug-card.A .jug-dorsal  { background: var(--rojo); color: #fff; }
.jug-card.A .estado-chip  { background: var(--rojo); color: #fff; }
.jug-card.R { background: var(--naranja-s); }
.jug-card.R .jug-dorsal  { background: var(--naranja); color: #fff; }
.jug-card.R .estado-chip  { background: var(--naranja); color: #fff; }

/* ── 4b: Sesión guardada — tarjetas de solo lectura ── */
.jug-ro-card {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-bottom: 1px solid var(--borde);
}
.jug-ro-card:last-child { border-bottom: none; }
.jug-ro-card.P { background: var(--verde-s); }
.jug-ro-card.P .jug-dorsal  { background: var(--verde); color: #fff; }
.jug-ro-card.P .estado-chip  { background: var(--verde); color: #fff; }
.jug-ro-card.A { background: var(--rojo-s); }
.jug-ro-card.A .jug-dorsal  { background: var(--rojo); color: #fff; }
.jug-ro-card.A .estado-chip  { background: var(--rojo); color: #fff; }
.jug-ro-card.R { background: var(--naranja-s); }
.jug-ro-card.R .jug-dorsal  { background: var(--naranja); color: #fff; }
.jug-ro-card.R .estado-chip  { background: var(--naranja); color: #fff; }
.sin-justif-chip {
  display: inline-flex; align-items: center; gap: 3px;
  background: #FFF3E0; color: #E65100;
  font-size: .62rem; font-weight: 700; padding: 2px 7px;
  border-radius: 10px; flex-shrink: 0;
}

/* ── 4a: Credenciales — aviso admin ── */
.cred-aviso-box {
  display: flex; gap: 10px; align-items: flex-start;
  background: #FFF8E1; border: 1px solid #FFD54F; border-radius: 10px;
  padding: 12px 14px; margin-bottom: 14px;
}
.cred-aviso-box .cred-aviso-icon { font-size: 1.2rem; flex-shrink: 0; }
.cred-aviso-box strong { font-size: .82rem; color: #5D4037; display: block; margin-bottom: 6px; }
.cred-aviso-box p { font-size: .74rem; color: #6D4C41; margin: 3px 0; }
.cred-aviso-box p strong { display: inline; margin-bottom: 0; }

/* ── Toggle entrenador ── */
.ent-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid var(--borde);
}
.ent-row:last-child { border-bottom: none; }
.ent-nombre { flex: 1; font-size: .88rem; font-weight: 500; }
.ent-sub    { font-size: .72rem; color: var(--texto-sec); }
.toggle-sw  { position: relative; width: 44px; height: 24px; flex-shrink: 0; margin-left: auto; }
.toggle-sw input { display: none; }
.toggle-sl {
  position: absolute; inset: 0; background: #BDBDBD; border-radius: 12px;
  cursor: pointer; transition: background .18s;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
}
.toggle-sl::after {
  content: ''; position: absolute; width: 18px; height: 18px;
  left: 3px; top: 3px; background: #fff; border-radius: 50%;
  transition: transform .18s; box-shadow: 0 1px 3px rgba(0,0,0,.35);
}
.toggle-sw input:checked + .toggle-sl { background: var(--morado); }
.toggle-sw input:checked + .toggle-sl::after { transform: translateX(20px); }

/* ── Gestion cards ── */
.gestion-card {
  display: flex; align-items: center; gap: 16px;
  margin: 8px 16px; padding: 18px 16px;
  background: var(--blanco); border-radius: var(--r); box-shadow: var(--sombra-lg);
  border-left: 3px solid var(--morado-s); cursor: pointer; transition: transform .12s;
}
.gestion-card:active { transform: scale(.98); }
.gestion-icon {
  width: 52px; height: 52px; background: linear-gradient(135deg, #4A148C, #7B1FA2); border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.45rem; color: #fff; flex-shrink: 0;
}
.gestion-label { font-size: .93rem; font-weight: 700; }
.gestion-desc  { font-size: .74rem; color: var(--texto-sec); margin-top: 2px; }
.gestion-arrow { margin-left: auto; color: var(--borde); font-size: 1rem; }

/* ── Formularios ── */
.form-section { padding: 20px 16px 8px; }
.form-section-title {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .7px; color: var(--morado); margin-bottom: 14px;
}
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: .76rem; color: var(--texto-sec);
  margin-bottom: 5px; font-weight: 600;
}
.form-group input,
.form-group select {
  width: 100%; padding: 10px 12px;
  background: var(--fondo); border: 1.5px solid var(--borde);
  border-radius: 8px; font-size: .9rem; color: var(--texto);
  outline: none; transition: border-color .18s;
}
.form-group input:focus,
.form-group select:focus { border-color: var(--morado); background: var(--blanco); }
.form-group input:disabled { opacity: .6; cursor: not-allowed; }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }

/* ── Horario chips ── */
.dia-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.dia-chip {
  padding: 6px 11px; border-radius: 20px; font-size: .78rem; font-weight: 700;
  border: 1.5px solid var(--borde); background: var(--blanco); color: var(--texto-sec);
  cursor: pointer; transition: all .14s;
}
.dia-chip.sel { background: var(--morado); border-color: var(--morado); color: var(--blanco); }
.horario-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--borde);
}
.horario-row:last-child { border-bottom: none; }
.horario-dia { width: 36px; font-size: .8rem; font-weight: 700; color: var(--morado); flex-shrink: 0; }
.horario-row input[type="time"] {
  flex: 1; padding: 7px 9px; border: 1.5px solid var(--borde);
  border-radius: 7px; font-size: .84rem; background: var(--fondo); outline: none;
}
.horario-row input[type="time"]:focus { border-color: var(--morado); }

/* ── Lista asignados (form equipo) ── */
.asig-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--borde);
}
.asig-item:last-child { border-bottom: none; }
.asig-info { flex: 1; }
.asig-nombre { font-size: .87rem; font-weight: 600; }
.asig-sub    { font-size: .72rem; color: var(--texto-sec); }
.btn-rm {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--rojo-s); color: var(--rojo);
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem; flex-shrink: 0; cursor: pointer;
}

/* ── Lista admin ── */
.list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-bottom: 1px solid var(--borde);
  cursor: pointer; transition: background .1s;
}
.list-item:active { background: var(--morado-xs); }
.list-item:last-child { border-bottom: none; }
.li-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: radial-gradient(circle, #7B1FA2, #4A148C); display: flex; align-items: center;
  justify-content: center; font-size: .83rem; font-weight: 800;
  color: #fff; flex-shrink: 0;
}
.li-name  { font-size: .93rem; font-weight: 700; }
.li-sub   { font-size: .7rem; color: var(--morado); background: var(--morado-s); border-radius: 10px; padding: 2px 8px; display: inline-block; margin-top: 3px; }
.li-arrow { margin-left: auto; color: var(--borde); font-size: 1rem; }

/* ── Buscador modal ── */
.search-wrap { padding: 12px 16px 8px; position: sticky; top: 0; background: var(--blanco); z-index: 1; }
.search-wrap input {
  width: 100%; padding: 10px 14px; border: 1.5px solid var(--borde);
  border-radius: 24px; font-size: .9rem; outline: none;
}
.search-wrap input:focus { border-color: var(--morado); }
.sr-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid var(--borde); cursor: pointer;
}
.sr-item:active { background: var(--morado-xs); }
.sr-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--morado-s); display: flex; align-items: center;
  justify-content: center; font-size: .82rem; font-weight: 700;
  color: var(--morado); flex-shrink: 0;
}
.sr-name { font-size: .88rem; font-weight: 600; }
.sr-sub  { font-size: .73rem; color: var(--texto-sec); }
.sr-create {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; color: var(--morado); font-weight: 700;
  font-size: .88rem; cursor: pointer; border-top: 2px solid var(--borde); margin-top: 4px;
}

/* ── Selector tipo jugador ── */
.tipo-selector { display: flex; gap: 8px; margin-top: 8px; }
.tipo-opt {
  flex: 1; padding: 9px; border-radius: 8px; text-align: center;
  font-size: .82rem; font-weight: 600; cursor: pointer;
  border: 1.5px solid var(--borde); color: var(--texto-sec); transition: all .14s;
}
.tipo-opt.sel { background: var(--morado); border-color: var(--morado); color: var(--blanco); }

/* ── Modal bottom sheet ── */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.42); z-index: 200;
  display: flex; align-items: flex-end; opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
#modal-overlay.open { opacity: 1; pointer-events: all; }
#modal-sheet {
  width: 100%; max-width: 480px; margin: 0 auto;
  background: var(--blanco); border-radius: 20px 20px 0 0;
  max-height: 80vh; display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform .22s cubic-bezier(.4,0,.2,1);
}
#modal-overlay.open #modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 36px; height: 4px; background: var(--borde);
  border-radius: 2px; margin: 10px auto 0; flex-shrink: 0;
}
.modal-hdr {
  padding: 12px 16px 10px; border-bottom: 1px solid var(--borde);
  display: flex; align-items: center; flex-shrink: 0;
}
.modal-hdr h3 { flex: 1; font-size: .97rem; font-weight: 700; }
.modal-x {
  width: 30px; height: 30px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; color: var(--texto-sec); cursor: pointer;
}
.modal-body { overflow-y: auto; flex: 1; }

/* ── Loading / Toast ── */
#loading-overlay {
  position: fixed; inset: 0; background: rgba(10, 0, 30, 0.82); z-index: 300;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
}
@supports (backdrop-filter: blur(4px)) {
  #loading-overlay { backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
}
#loading-overlay.hidden { display: none; }
.loading-ball-wrap {
  animation: bb-bounce 0.85s ease-in-out infinite alternate;
}
.loading-ball {
  font-size: 78px; display: inline-block;
  animation: bb-spin 1.1s linear infinite;
  filter: drop-shadow(0 10px 22px rgba(0,0,0,0.45));
}
@keyframes bb-bounce {
  0%   { transform: translateY(0); }
  100% { transform: translateY(-22px); }
}
@keyframes bb-spin {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes pulse {
  0%   { opacity: 0.55; }
  100% { opacity: 1; }
}
#loading-msg { font-size: .95rem; font-weight: 600; color: rgba(255,255,255,.88); text-align: center; letter-spacing: .03em; }

#toast-container {
  position: fixed; bottom: calc(var(--nav-h) + 12px); left: 50%;
  transform: translateX(-50%); z-index: 400; width: 90%; max-width: 400px;
  display: flex; flex-direction: column; gap: 6px; align-items: center; pointer-events: none;
}
.toast {
  background: #1A1A1A; color: #fff; padding: 9px 18px; border-radius: 24px;
  font-size: .83rem; box-shadow: 0 4px 12px rgba(0,0,0,.2); animation: ti .18s ease;
}
.toast.success { background: var(--verde); }
.toast.error   { background: var(--rojo); }
.toast.out     { animation: to .25s ease forwards; }
@keyframes ti { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
@keyframes to { to   { opacity:0; transform:translateY(6px); } }

/* ── Confirm modals ── */
.modal-confirm-icon {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px; font-size: 28px;
}
.modal-confirm-danger .modal-confirm-icon  { background: var(--rojo-s); color: var(--rojo); }
.modal-confirm-warning .modal-confirm-icon { background: #FEF3C7; color: #F59E0B; }
.modal-confirm-msg { font-size: .9rem; text-align: center; padding: 0 8px; color: var(--texto-sec); }
.modal-confirm-msg strong { color: var(--texto); }
.btn-destructive { background: var(--rojo); color: #fff; flex: 1; }

/* ── Stats de sesiones ── */
.sc-status-badge {
  font-size: .65rem; font-weight: 700; padding: 2px 7px;
  border-radius: 10px; white-space: nowrap;
}
.sc-status-badge.registrada { background: var(--verde-s); color: var(--verde); }
.sc-status-badge.pendiente {
  width: 18px; height: 18px; border-radius: 50%; background: var(--rojo); color: #fff;
  font-size: .75rem; font-weight: 900; display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.sc-stats { font-size: .68rem; color: var(--texto-sec); margin-top: 3px; }

/* ── Historial por mes ── */
.historial-mes-hdr {
  padding: 10px 16px 4px; font-size: .72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .6px; color: var(--morado);
  background: var(--morado-xs); border-bottom: 1px solid var(--morado-s);
}

/* ── Utilidades ── */
.hidden  { display: none !important; }
.divider { border: none; border-top: 1px solid var(--borde); margin: 0; }
.p-16    { padding: 16px; }
.mt-8    { margin-top: 8px; }
.mt-16   { margin-top: 16px; }
.empty-state { text-align: center; padding: 48px 24px; color: var(--texto-sec); }
.empty-state .ei { font-size: 2.8rem; margin-bottom: 12px; }
.empty-state p   { font-size: .88rem; }

/* ── Vistas detalle ── */
.detalle-perfil {
  background: linear-gradient(135deg, #4A148C, #7B1FA2);
  color: #fff; padding: 24px 20px 28px;
  display: flex; align-items: center; gap: 18px;
}
.detalle-avatar {
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(255,255,255,.2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.85rem; font-weight: 800;
  border: 3px solid rgba(255,255,255,.35);
}
.detalle-nombre { font-size: 1.05rem; font-weight: 800; }
.detalle-sub    { font-size: .79rem; opacity: .82; margin-top: 4px; }
.detalle-meta   { font-size: .72rem; opacity: .65; margin-top: 3px; }

/* Grids de widgets */
.stat-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 16px 0; }
.stat-grid-1 { padding: 10px 16px 0; }
.stat-widget {
  background: #fff; border-radius: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,.09); padding: 14px 16px;
}
.stat-widget-title {
  font-size: .66rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .6px; color: var(--texto-sec); margin-bottom: 8px;
}
.stat-valor { font-size: 2.1rem; font-weight: 900; line-height: 1; }
.stat-label { font-size: .72rem; color: var(--texto-sec); margin-top: 4px; }
.stat-valor.verde   { color: #2E7D32; }
.stat-valor.rojo    { color: #C62828; }
.stat-valor.azul    { color: #1565C0; }
.stat-valor.naranja { color: #E65100; }

/* Barras */
.bar-wrap { margin-top: 4px; }
.bar-row  { margin-bottom: 10px; }
.bar-row:last-child { margin-bottom: 0; }
.bar-label-row { display: flex; justify-content: space-between; font-size: .74rem; margin-bottom: 5px; }
.bar-label-row .bar-name { font-weight: 600; }
.bar-label-row .bar-val  { color: var(--texto-sec); }
.bar-track { height: 8px; background: var(--fondo); border-radius: 4px; overflow: hidden; }
.bar-fill  { height: 100%; border-radius: 4px; transition: width .4s ease; }

/* Tags / ranking */
.detalle-equipo-tag {
  display: inline-flex; align-items: center;
  background: var(--morado-s); color: var(--morado);
  border-radius: 20px; padding: 5px 12px;
  font-size: .75rem; font-weight: 700; margin: 3px 3px 3px 0;
}
.ranking-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--borde);
}
.ranking-row:last-child { border-bottom: none; }
.ranking-num  { width: 20px; font-size: .73rem; font-weight: 800; color: var(--texto-sec); text-align: center; }
.ranking-name { flex: 1; font-size: .85rem; font-weight: 600; }
.ranking-val  { font-size: .82rem; font-weight: 700; }

/* Botón editar en header */
#btn-edit {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,.2); color: var(--blanco);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; cursor: pointer; transition: background .15s;
}
#btn-edit:active { background: rgba(255,255,255,.35); }
#btn-edit.hidden { display: none !important; }

/* ── Vista de Login ── */
#view-login {
  background: linear-gradient(135deg, #4A148C 0%, #1a0236 100%);
  min-height: 100%;
  /* CAMBIO: Quitamos 'display: flex' de aquí para que la app pueda ocultarlo */
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  position: absolute;
  inset: 0;
  z-index: 150;
  overflow-y: auto;
}

/* LÍNEA NUEVA: Solo se muestra en modo flex si tiene la clase active */
#view-login.active {
  display: flex;
}

.login-container {
  width: 100%;
  max-width: 340px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: var(--r-lg);
  padding: 36px 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  text-align: center;
  margin: auto;
}

.login-logo {
  font-size: 3.5rem;
  margin-bottom: 12px;
  animation: bb-bounce 0.85s ease-in-out infinite alternate;
  display: inline-block;
}

.login-title {
  color: #fff;
  font-size: 1.8rem;
  font-weight: 800;
  letter-spacing: 1.5px;
  margin-bottom: 4px;
}

.login-subtitle {
  color: rgba(255,255,255,0.65);
  font-size: 0.85rem;
  margin-bottom: 24px;
}

.btn-login {
  background: #fff;
  color: var(--morado) !important;
  font-weight: 800;
  width: 100%;
  margin-top: 16px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  border-radius: 24px;
}

.btn-login:active {
  background: var(--morado-s);
  transform: scale(0.98);
}
#user-badge {
  cursor: pointer;
}
#user-badge:active {
  background: rgba(255,255,255,0.35);
}

/* ══════════════════════════════════════════════
   NUEVOS ESTILOS — Sistema de 4 roles (v2)
   ══════════════════════════════════════════════ */

/* ── 3c-1: Login toggle tabs ── */
.login-tabs {
  display: flex; gap: 4px; margin: 16px 0 4px;
  background: rgba(255,255,255,.1); border-radius: 24px; padding: 4px;
}
.login-tab {
  flex: 1; padding: 9px 6px; border-radius: 20px;
  font-size: .78rem; font-weight: 700; color: rgba(255,255,255,.6);
  transition: all .18s; white-space: nowrap;
}
.login-tab.active {
  background: #fff; color: var(--morado);
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
}

/* ── 3c-2: Badge admin en lista de entrenadores ── */
.badge-admin {
  display: inline-flex; align-items: center; gap: 3px;
  background: #1a237e; color: #fff;
  font-size: .6rem; font-weight: 800; padding: 2px 7px;
  border-radius: 10px; text-transform: uppercase; letter-spacing: .4px;
  flex-shrink: 0;
}

/* ── 3c-3: Chip Visor en tarjetas de equipo ── */
.chip-visor {
  display: inline-flex; align-items: center; gap: 4px;
  background: #E3F2FD; color: #1565C0;
  font-size: .63rem; font-weight: 700; padding: 2px 8px;
  border-radius: 10px; margin-left: auto; flex-shrink: 0;
}

/* ── 4d: Chip Mi equipo en lista gestión ── */
.chip-mi-equipo {
  display: inline-flex; align-items: center; gap: 4px;
  background: #E8F5E9; color: #2E7D32;
  font-size: .63rem; font-weight: 700; padding: 2px 8px;
  border-radius: 10px; margin-left: auto; flex-shrink: 0;
}

/* ── 3c-4: Mini-stats en tarjetas de equipo ── */
.eq-stats {
  display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap;
}
.eq-stat-chip {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px; border-radius: 10px;
  font-size: .63rem; font-weight: 700;
}
.eq-stat-chip.p { background: var(--verde-s); color: var(--verde); }
.eq-stat-chip.a { background: var(--rojo-s);  color: var(--rojo); }
.eq-stat-chip.r { background: var(--naranja-s); color: var(--naranja); }
.eq-stat-chip .dot {
  width: 6px; height: 6px; border-radius: 50%; background: currentColor;
}

/* ── 3c-5: Sesiones del jugador coloreadas por estado propio ── */
.sesion-jug-card {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 16px; border-bottom: 1px solid var(--borde);
  cursor: pointer; transition: background .1s; position: relative;
}
.sesion-jug-card:last-child { border-bottom: none; }
.sesion-jug-card:active { background: var(--morado-xs); }
.sesion-jug-card.estado-P { border-left: 4px solid var(--verde); }
.sesion-jug-card.estado-A { border-left: 4px solid var(--rojo); background: var(--rojo-s); }
.sesion-jug-card.estado-R { border-left: 4px solid var(--naranja); background: var(--naranja-s); }
.sesion-jug-card.estado-sin { border-left: 4px solid var(--borde); }
.sjc-estado {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem; font-weight: 800;
}
.sjc-estado.P { background: var(--verde); color: #fff; }
.sjc-estado.A { background: var(--rojo);  color: #fff; }
.sjc-estado.R { background: var(--naranja); color: #fff; }
.sjc-estado.sin { background: var(--borde); color: var(--texto-sec); font-size: .65rem; }

/* ── 3c-6: Indicador justificación enviada ── */
.justif-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: #E3F2FD; color: #1565C0;
  font-size: .62rem; font-weight: 700; padding: 2px 7px;
  border-radius: 10px; margin-left: auto; flex-shrink: 0;
}
.justif-badge::before { content: '✓'; font-size: .7rem; }
.btn-justificar {
  margin-left: auto; padding: 6px 13px; border-radius: 20px;
  background: var(--naranja-s); color: var(--naranja);
  font-size: .76rem; font-weight: 700; border: 1.5px solid var(--naranja);
  flex-shrink: 0; transition: opacity .15s;
}
.btn-justificar:active { opacity: .7; }

/* ── 3c-7: Modal de justificación ── */
.modal-justif-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 210;
  display: flex; align-items: flex-end; justify-content: center;
  transition: opacity .2s;
}
.modal-justif-overlay.hidden { opacity: 0; pointer-events: none; }
.modal-justif-overlay:not(.hidden) { opacity: 1; pointer-events: all; }
.modal-justif-sheet {
  width: 100%; max-width: 480px;
  background: var(--blanco); border-radius: 20px 20px 0 0;
  max-height: 92vh; display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform .22s cubic-bezier(.4,0,.2,1);
}
.modal-justif-overlay:not(.hidden) .modal-justif-sheet { transform: translateY(0); }
.modal-justif-sheet .modal-body { padding: 12px 16px 32px; overflow-y: auto; }
.radio-group { display: flex; gap: 10px; margin-top: 6px; }
.radio-opt {
  flex: 1; display: flex; align-items: center; gap: 8px; cursor: pointer;
  padding: 10px 12px; border: 1.5px solid var(--borde); border-radius: 10px;
  font-size: .85rem; font-weight: 600; transition: all .15s;
}
.radio-opt:has(input:checked) { border-color: var(--morado); background: var(--morado-s); color: var(--morado); }
.radio-opt input { accent-color: var(--morado); }
.justif-preview-wrap {
  background: var(--fondo); border-radius: 10px; padding: 12px;
  margin: 4px 0 14px; border-left: 3px solid var(--morado);
}
.justif-preview-label { font-size: .7rem; font-weight: 700; color: var(--texto-sec); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px; }
.justif-preview { font-size: .82rem; color: var(--texto); line-height: 1.5; min-height: 36px; white-space: pre-wrap; }
.form-group textarea {
  width: 100%; padding: 10px 12px;
  background: var(--fondo); border: 1.5px solid var(--borde);
  border-radius: 8px; font-size: .9rem; color: var(--texto);
  outline: none; resize: none; transition: border-color .18s; font-family: inherit;
}
.form-group textarea:focus { border-color: var(--morado); background: var(--blanco); }

/* ── 3c-8: Vista perfil jugador y ajustes cuenta ── */
.perfil-jugador-container { padding: 24px 16px 20px; }
.perfil-avatar {
  width: 88px; height: 88px; border-radius: 50%;
  background: linear-gradient(135deg, #4A148C, #7B1FA2);
  display: flex; align-items: center; justify-content: center;
  font-size: 2.5rem; margin: 0 auto 12px; box-shadow: var(--sombra-lg);
}
.perfil-nombre {
  text-align: center; font-size: 1.15rem; font-weight: 800;
  color: var(--texto); margin-bottom: 4px;
}
.perfil-equipo {
  text-align: center; font-size: .78rem; color: var(--morado);
  background: var(--morado-s); border-radius: 20px;
  padding: 3px 12px; display: inline-block; margin: 0 auto 20px;
  left: 50%; position: relative; transform: translateX(-50%);
}
/* ── 4e-2: 3 botones horizontales navegación perfil ── */
.perfil-nav-3 {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
}
.perfil-nav-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; padding: 14px 6px; border-radius: var(--r);
  background: var(--blanco); box-shadow: var(--sombra-lg);
  border: 1.5px solid var(--borde); transition: transform .12s, box-shadow .12s;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.perfil-nav-btn:active { transform: scale(.96); box-shadow: var(--sombra); }
.perfil-nav-icon  { font-size: 1.6rem; line-height: 1; }
.perfil-nav-label { font-size: .72rem; font-weight: 700; color: var(--texto); text-align: center; line-height: 1.25; }

/* ── 4e-4: Ranking asistencia (mi-equipo) ── */
.ranking-medal { font-size: 1.1rem; flex-shrink: 0; width: 22px; text-align: center; }
.ranking-pos   { width: 22px; text-align: center; font-size: .76rem; font-weight: 800; color: var(--texto-sec); flex-shrink: 0; }
.ranking-yo    { background: var(--morado-s); border-radius: 8px; padding: 9px 8px; margin: 2px -8px; }
.ranking-bar-wrap { flex: 1; height: 6px; background: var(--fondo); border-radius: 3px; overflow: hidden; margin: 0 8px; }
.ranking-bar-fill { height: 100%; background: var(--morado); border-radius: 3px; transition: width .4s ease; }
.ranking-val.verde   { color: #2E7D32; }
.ranking-val.rojo    { color: #C62828; }
.ranking-val.naranja { color: #E65100; }

/* Bloque estado sesión (vista detalle jugador) */
.sesion-estado-bloque {
  display: flex; align-items: center; gap: 16px;
  padding: 20px 16px; border-bottom: 1px solid var(--borde);
}
.sesion-estado-icono {
  width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; font-weight: 900; flex-shrink: 0;
}
.sesion-estado-icono.P { background: var(--verde-s); color: var(--verde); }
.sesion-estado-icono.A { background: var(--rojo-s);  color: var(--rojo); }
.sesion-estado-icono.R { background: var(--naranja-s); color: var(--naranja); }
.sesion-estado-icono.sin { background: var(--fondo); color: var(--texto-sec); font-size: 1.2rem; }
.sesion-estado-texto { font-size: .95rem; font-weight: 700; }
.sesion-estado-sub   { font-size: .78rem; color: var(--texto-sec); margin-top: 3px; }

/* ── 5a: Mini-stats entrenadores en lista ── */
.ent-mini-stats {
  display: flex; flex-direction: row; align-items: center;
  gap: 6px; margin-right: 2px;
}
.ems-frac { display: flex; align-items: baseline; gap: 1px; }
.ems-big { font-size: 1.15rem; font-weight: 900; color: var(--morado); }
.ems-de  { font-size: .62rem; font-weight: 700; color: var(--texto-sec); }
.ems-pct { font-size: 1.15rem; font-weight: 900; color: var(--morado); }
.ems-val { font-size: .88rem; font-weight: 800; color: var(--morado); line-height: 1; }
.ems-lab { font-size: .6rem; color: var(--texto-sec); text-align: center; margin-top: 2px; }

/* ── 5b: Tarjeta equipo ampliada ── */
.eq-card {
  display: flex; flex-direction: column;
  padding: 14px 16px; border-bottom: 1px solid var(--borde);
  cursor: pointer; transition: background .1s;
}
.eq-card:active { background: var(--morado-xs); }
.eq-card:last-child { border-bottom: none; }
.eq-card-hdr { display: flex; align-items: center; gap: 12px; }
.eq-card-body { margin-top: 8px; padding-left: 52px; }
.eq-card-stats { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
.eq-card-stat { font-size: .72rem; color: var(--texto-sec); }
.eq-card-stat strong { color: var(--texto); font-weight: 800; }
.eq-pct-bar-wrap { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.eq-pct-bar { flex: 1; height: 5px; background: var(--fondo); border-radius: 3px; overflow: hidden; }
.eq-pct-fill { height: 100%; border-radius: 3px; background: var(--morado); transition: width .4s; }
.eq-pct-label { font-size: .68rem; font-weight: 800; color: var(--morado); min-width: 32px; }

/* ── 5c: Agrupación jugadores por equipo ── */
.grp-header {
  padding: 9px 16px 6px; background: var(--fondo);
  border-bottom: 1px solid var(--borde);
  border-top: 1px solid var(--borde);
}
.grp-header:first-child { border-top: none; }
.grp-header-nombre { font-size: .8rem; font-weight: 800; color: var(--morado); }
.grp-header-sub { font-size: .67rem; color: var(--texto-sec); margin-top: 1px; }

/* mini-stats jugador en lista */
.jug-list-stats {
  display: flex; flex-direction: row; align-items: center;
  gap: 6px; margin-right: 2px;
}
.jls-frac { display: flex; align-items: baseline; gap: 1px; }
.jls-big { font-size: 1.15rem; font-weight: 900; }
.jls-big.verde   { color: var(--verde); }
.jls-big.naranja { color: var(--naranja); }
.jls-big.rojo    { color: var(--rojo); }
.jls-big.sec     { color: var(--texto-sec); }
.jls-de  { font-size: .62rem; font-weight: 700; color: var(--texto-sec); }
.jls-pct { font-size: 1.15rem; font-weight: 900; }
.jls-pct.verde   { color: var(--verde); }
.jls-pct.naranja { color: var(--naranja); }
.jls-pct.rojo    { color: var(--rojo); }
.jls-pct.sec     { color: var(--texto-sec); }
.jls-val { font-size: .85rem; font-weight: 800; line-height: 1; }
.jls-val.verde   { color: var(--verde); }
.jls-val.naranja { color: var(--naranja); }
.jls-val.rojo    { color: var(--rojo); }
.jls-val.sec     { color: var(--texto-sec); }
.jls-lab { font-size: .6rem; color: var(--texto-sec); text-align: center; margin-top: 2px; }

/* ── 5d: Vista sesiones — subtítulo ── */
.sesiones-desc { font-size: .76rem; color: rgba(255,255,255,.75); margin-top: 4px; }

/* ── 5e: Sesión guardada diferenciada ── */
.sesion-ro-header-wrap {
  background: linear-gradient(135deg, #3d0e70, #7B1FA2);
  color: #fff; padding: 20px 16px 16px; position: relative;
}
.sesion-ro-header-wrap h2   { color: #fff; font-size: 1.1rem; margin: 0 0 4px; font-weight: 800; }
.sesion-ro-header-wrap .vh-sub    { color: rgba(255,255,255,.78); font-size: .82rem; }
.sesion-ro-header-wrap .vh-horario { color: rgba(255,255,255,.65); font-size: .76rem; margin-top: 6px; white-space: pre-line; }
.sesion-ro-edit-btn {
  position: absolute; top: 14px; right: 14px;
  background: rgba(255,255,255,.18); color: #fff;
  border: 1.5px solid rgba(255,255,255,.45);
  padding: 6px 14px; border-radius: 20px;
  font-size: .78rem; font-weight: 700; cursor: pointer;
}
.sesion-ro-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.18); color: #fff;
  font-size: .65rem; font-weight: 800; padding: 3px 10px;
  border-radius: 10px; text-transform: uppercase; letter-spacing: .5px;
  margin-bottom: 8px;
}
.sesion-ro-resumen {
  display: flex; border-bottom: 1px solid var(--borde);
}
.sesion-ro-stat {
  flex: 1; padding: 12px 8px; text-align: center;
