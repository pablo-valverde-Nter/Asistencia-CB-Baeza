<script>
// ================================================================
// CB Baeza -- SPA principal
// ================================================================
const App = {

  state: {
    auth:      null,
    usuario:   null,
    esAdmin:   false,
    equipos:   [],
    currentView: 'equipos',
    viewHistory: [],
    equipoSesionesId: null,
    _equipoNombre:    null,
    sesionId:         null,
    // Form equipo
    formEquipoId:      null,
    formEntrenadores:  [],
    formJugadores:     [],
    formDias:          {},
    formEntOriginales: [],
    formJugOriginales: [],
    // Form jugador / entrenador
    formJugadorId:     null,
    formEntrenadorId:  null,
    _volverAEquipoFormDespues: false,
    // Cache
    _todosJugadores:    [],
    _todosEntrenadores: [],
    _buscadorItems:     [],
    _buscadorTipo:      null,
    _jugadorPendiente:  null,
    _tipoJugSelec:      'Principal',
    _formIsDirty:            false,
    _sesionAutoSaveTimer:    null,
    _authReqSeq:             0,
    _pendingConfirmSave:     null,
    _credGuardadoConfirmado: false,
    // Vistas detalle
    detalleJugadorId:    null,
    detalleEntrenadorId: null,
    detalleEquipoId:     null,
    // Sistema de 4 roles
    rol:                  null,
    equiposVisor:         [],
    jugador:              null,
    motivosJustificacion: [],
    _loginTipo:           'entrenador',
    sesionJugadorId:      null,
  },

  // ── Cache en memoria: cargado una vez al inicio, actualizado tras cada escritura ──
  cache: {
    jugadores:           [],
    entrenadores:        [],
    equipos:             [],
    jugadoresEquipos:    [],
    entrenadoresEquipos: [],
    horarios:            [],
    sesiones:            [],
    temporadas:          [],
    asistencias:         {},  // sesionId → objeto asistencia (se invalida al guardar)
    asistJugadores:      [],  // todos los registros de Asist_Jugadores
    asistEntrenadores:   [],  // todos los registros de Asist_Entrenadores

    getJugadorById(id)     { return this.jugadores.find(function(j)  { return j.ID === id; }) || null; },
    getEntrenadorById(id)  { return this.entrenadores.find(function(e){ return e.ID === id; }) || null; },
    getEquipoById(id)      { return this.equipos.find(function(e)     { return e.ID === id; }) || null; },

    getJugadoresByEquipo(equipoId) {
      var self = this;
      return this.jugadoresEquipos
        .filter(function(r) { return r.ID_Equipo === equipoId && (r.Activo === true || r.Activo === 'TRUE'); })
        .map(function(r) { var j = self.getJugadorById(r.ID_Jugador); return j ? Object.assign({}, j, { Tipo: r.Tipo }) : null; })
        .filter(Boolean);
    },

    getEntrenadoresByEquipo(equipoId) {
      var self = this;
      return this.entrenadoresEquipos
        .filter(function(r) { return r.ID_Equipo === equipoId && (r.Activo === true || r.Activo === 'TRUE'); })
        .map(function(r) { return self.getEntrenadorById(r.ID_Entrenador); })
        .filter(Boolean);
    },

    getHorariosByEquipo(equipoId) {
      return this.horarios.filter(function(h) { return h.ID_Equipo === equipoId; });
    },

    getSesionesByEquipo(equipoId) {
      return this.sesiones
        .filter(function(s) { return s.ID_Equipo === equipoId; })
        .sort(function(a, b) { return a.Fecha < b.Fecha ? -1 : 1; });
    },

    upsert(key, record) {
      if (!Array.isArray(this[key])) return;
      var found = false;
      for (var i = 0; i < this[key].length; i++) {
        if (this[key][i].ID === record.ID) { this[key][i] = Object.assign({}, this[key][i], record); found = true; break; }
      }
      if (!found) this[key].push(record);
    },

    remove(key, id) {
      if (!Array.isArray(this[key])) return;
      this[key] = this[key].filter(function(r) { return r.ID !== id; });
    },

    // Reemplaza las relaciones de un equipo en cache con el estado actual del formulario
    _setRelacionesEquipo(equipoId, jugadores, entrenadores) {
      App.cache.jugadoresEquipos   = App.cache.jugadoresEquipos.filter(function(r) { return r.ID_Equipo !== equipoId; });
      App.cache.entrenadoresEquipos= App.cache.entrenadoresEquipos.filter(function(r) { return r.ID_Equipo !== equipoId; });
      jugadores.forEach(function(j) {
        App.cache.jugadoresEquipos.push({ ID: 'je_'+j.ID+'_'+equipoId, ID_Equipo: equipoId, ID_Jugador: j.ID, Tipo: j.Tipo, Activo: true });
      });
      entrenadores.forEach(function(e) {
        App.cache.entrenadoresEquipos.push({ ID: 'ee_'+e.ID+'_'+equipoId, ID_Equipo: equipoId, ID_Entrenador: e.ID, Activo: true });
      });
    },
  },

  init() {
    var reqSeq = ++App.state._authReqSeq;
    _clientLog('init_start', { hasAuthMem: !!App.state.auth });
    if (!App.state.auth) {
      var stored = _getStoredAuth();
      _clientLog('init_read_storage', { hasStored: !!stored });
      if (stored) {
        try {
          App.state.auth = JSON.parse(stored);
          // Compatibilidad hacia atrás: sesiones antiguas sin campo 'tipo'
          if (App.state.auth && App.state.auth.email && !App.state.auth.tipo) {
            App.state.auth.tipo = 'entrenador';
            _setStoredAuth(JSON.stringify(App.state.auth));
          }
          _clientLog('init_storage_parse_ok', { tipo: App.state.auth && App.state.auth.tipo ? App.state.auth.tipo : null });
        } catch (e) {
          App.state.auth = null;
          _clearStoredAuth();
          _clientLog('init_storage_parse_error', { error: e.message });
        }
      }
    }

    if (!App.state.auth) {
      _clientLog('init_no_auth_navigate_login', {});
      hideLoading();
      App.navigate('login');
      return;
    }

    showLoading('Cargando...');
    server('cargarDatos')
      .then(function(res) {
        if (reqSeq !== App.state._authReqSeq) {
          _clientLog('init_cargarDatos_stale_ignored', { reqSeq: reqSeq, currentReqSeq: App.state._authReqSeq });
          return;
        }
        hideLoading();
        if (!res.success) { 
          _clientLog('init_cargarDatos_fail', { stage: res.stage || null, traceId: res.traceId || null, error: res.error || null });
          showToast(_formatDiagError(res.error || 'Sesión no válida', res, 'init_cargarDatos'), 'error'); 
          // Solo cerrar sesión si el backend indica fallo de autenticación.
          // Para errores de datos/hojas, mantener auth y permitir reintento.
          if ((res.stage || '') === 'auth_context') {
            App.cerrarSesion('init_cargarDatos_fail_auth');
          }
          return; 
        }
        App._applyBootstrapData(res);
        _clientLog('init_cargarDatos_ok', { traceId: res.traceId || null, currentView: App.state.currentView });
        
        if (App.state.currentView === 'login') {
          var homeView = App.state.rol === 'jugador' ? 'perfil-jugador' : 'equipos';
          _clientLog('init_navigate_home_from_login', { homeView: homeView });
          App.navigate(homeView);
        } else {
          _clientLog('init_navigate_current', { view: App.state.currentView });
          App.navigate(App.state.currentView);
        }
      })
      .catch(function(err) { 
        if (reqSeq !== App.state._authReqSeq) {
          _clientLog('init_cargarDatos_network_stale_ignored', { reqSeq: reqSeq, currentReqSeq: App.state._authReqSeq });
          return;
        }
        hideLoading(); 
        _clientLog('init_cargarDatos_network_error', { error: (err && err.message) || null });
        showToast(_formatDiagError((err && err.message) || 'Error de conexión', null, 'init_network'), 'error'); 
        // No cerrar sesión por un fallo de red transitorio.
      });
  },

  setLoginTipo(tipo) {
    App.state._loginTipo = tipo;
    document.getElementById('tab-entrenador').classList.toggle('active', tipo === 'entrenador');
    document.getElementById('tab-jugador').classList.toggle('active', tipo === 'jugador');
    document.getElementById('login-field-email').classList.toggle('hidden', tipo === 'jugador');
    document.getElementById('login-field-usuario').classList.toggle('hidden', tipo === 'entrenador');
  },

  iniciarSesion() {
    var reqSeq = ++App.state._authReqSeq;
    var tipo = App.state._loginTipo || 'entrenador';
    var credencial = tipo === 'jugador'
      ? document.getElementById('login-usuario').value.trim()
      : document.getElementById('login-email').value.trim();
    var pin = document.getElementById('login-pin').value.trim();
    _clientLog('login_submit', { tipo: tipo, credencialLen: credencial ? credencial.length : 0, pinLen: pin ? String(pin).length : 0 });

    if (!credencial || !pin) {
      showToast('Introduce ' + (tipo === 'jugador' ? 'tu usuario' : 'tu email') + ' y el PIN', 'error');
      return;
    }

    showLoading('Iniciando sesión...');
    server('iniciarSesion', tipo, credencial, pin)
      .then(function(res) {
        if (reqSeq !== App.state._authReqSeq) {
          _clientLog('login_response_stale_ignored', { reqSeq: reqSeq, currentReqSeq: App.state._authReqSeq });
          return;
        }
        hideLoading();
        if (res && res.success) {
          _clientLog('login_success', { traceId: res.traceId || null });
          var auth = tipo === 'jugador'
            ? { tipo: 'jugador', usuario: credencial, pin: pin }
            : { tipo: 'entrenador', email: credencial, pin: pin };
          App.state.auth = auth;
          _setStoredAuth(JSON.stringify(auth));
          App._applyBootstrapData(res);
          showToast('Sesión iniciada', 'success');
          document.getElementById(tipo === 'jugador' ? 'login-usuario' : 'login-email').value = '';
          document.getElementById('login-pin').value = '';
          _clientLog('login_navigate_home', { rol: App.state.rol });
          App.navigate(App.state.rol === 'jugador' ? 'perfil-jugador' : 'equipos');
        } else {
          _clientLog('login_fail', { stage: res && res.stage ? res.stage : null, traceId: res && res.traceId ? res.traceId : null, error: res && res.error ? res.error : null });
          showToast(_formatDiagError((res && res.error) || 'Credenciales incorrectas', res, 'login_auth'), 'error');
        }
      })
      .catch(function(err) {
        if (reqSeq !== App.state._authReqSeq) {
          _clientLog('login_network_stale_ignored', { reqSeq: reqSeq, currentReqSeq: App.state._authReqSeq });
          return;
        }
        hideLoading();
        _clientLog('login_network_error', { error: (err && err.message) || null });
        showToast(_formatDiagError((err && err.message) || 'Error al conectar', null, 'login_network'), 'error');
      });
  },

  confirmarCerrarSesion() {
    App.openModal('Cerrar Sesión',
      '<div class="modal-confirm-warning" style="padding:20px 16px 16px;text-align:center">' +
      '<div class="modal-confirm-icon">&#x26A0;</div>' +
      '<div class="modal-confirm-msg">¿Seguro que quieres cerrar sesión?<br><br>Tendrás que introducir tu PIN de nuevo para acceder.</div>' +
      '<div style="display:flex;gap:8px;margin-top:20px">' +
      '<button class="btn btn-secondary" style="flex:1" onclick="App.closeModal()">Cancelar</button>' +
      '<button class="btn btn-destructive" style="flex:1" onclick="App.closeModal();App.cerrarSesion()">Cerrar Sesión</button>' +
      '</div></div>'
    );
  },

  cerrarSesion(reason) {
    _clientLog('cerrarSesion', { reason: reason || 'manual_or_unknown', view: App.state.currentView || null });
    hideLoading(); // Garantiza que el overlay no quede visible si se llama durante la carga inicial
    App.state._authReqSeq++;
    App.state.auth = null;
    _clearStoredAuth();
    App.state.usuario = null;
    App.state.esAdmin = false;
    App.state.equipos = [];
    App.state.rol = null;
    App.state.jugador = null;
    App.state.equiposVisor = [];
    App.state.motivosJustificacion = [];
    document.getElementById('user-badge').textContent = '...';
    
    // Limpiar caché
    App.cache.jugadores           = [];
    App.cache.entrenadores        = [];
    App.cache.equipos             = [];
    App.cache.jugadoresEquipos    = [];
    App.cache.entrenadoresEquipos = [];
    App.cache.horarios            = [];
    App.cache.sesiones            = [];
    App.cache.temporadas          = [];
    App.cache.asistJugadores      = [];
    App.cache.asistEntrenadores   = [];
    App.cache.asistencias         = {};

    App.navigate('login');
  },

  _applyBootstrapData(res) {
    App.cache.jugadores           = res.jugadores           || [];
    App.cache.entrenadores        = res.entrenadores        || [];
    App.cache.equipos             = res.equipos             || [];
    App.cache.jugadoresEquipos    = res.jugadoresEquipos    || [];
    App.cache.entrenadoresEquipos = res.entrenadoresEquipos || [];
    App.cache.horarios            = res.horarios            || [];
    App.cache.sesiones            = res.sesiones            || [];
    App.cache.temporadas          = res.temporadas          || [];
    App.cache.asistJugadores      = res.asistJugadores      || [];
    App.cache.asistEntrenadores   = res.asistEntrenadores   || [];

    var ctx = res.contexto || {};
    App.state.rol          = ctx.rol || 'entrenador';
    App.state.esAdmin      = !!ctx.esAdmin;
    App.state.equipos      = ctx.equipos      || [];
    App.state.equiposVisor = ctx.equiposVisor || [];
    App.state.motivosJustificacion = res.motivosJustificacion || [];

    if (ctx.rol === 'jugador') {
      App.state.jugador  = ctx.jugador || null;
      App.state.usuario  = null;
      var jCtx = ctx.jugador;
      document.getElementById('user-badge').textContent = jCtx ? (jCtx.Nombre + ' ' + jCtx.Apellidos) : 'Jugador';
    } else {
      App.state.usuario = ctx.entrenador || null;
      App.state.jugador = null;
      var nombre = ctx.entrenador
        ? (ctx.entrenador.Nombre + ' ' + ctx.entrenador.Apellidos)
        : (ctx.esAdmin ? 'Admin' : '-');
      document.getElementById('user-badge').textContent = nombre;
    }
  },

  navigate(view, params, push) {
    if (App.state.currentView === 'sesion' && view !== 'sesion') App.views.sesion._stopAutoSave();
    if (push === undefined) push = true;
    if (view === 'login') {
      App.state.viewHistory = [];
    }
    if (push && App.state.currentView !== view && view !== 'login') {
      App.state.viewHistory.push(App.state.currentView);
    }
    App.state.currentView = view;

    document.querySelectorAll('.view').forEach(function(el) { el.classList.remove('active'); });
    var el = document.getElementById('view-' + view);
    if (el) el.classList.add('active');

    // Ocultar header y nav inferior si es la pantalla de Login
    var isLogin = (view === 'login');
    document.getElementById('app-header').classList.toggle('hidden', isLogin);
    document.getElementById('bottom-nav').classList.toggle('hidden', isLogin);

    document.querySelectorAll('.nav-tab').forEach(function(tab) {
      tab.classList.toggle('active', tab.dataset.view === view);
    });

    // Mostrar/ocultar pestañas según rol del usuario
    var esJugador = App.state.rol === 'jugador';
    document.querySelectorAll('.nav-tab-ent').forEach(function(t) { t.classList.toggle('hidden', esJugador); });
    document.querySelectorAll('.nav-tab-jug').forEach(function(t) { t.classList.toggle('hidden', !esJugador); });

    var mainViews = ['equipos', 'gestion', 'perfil-jugador', 'mis-entrenamientos'];
    var showBack = !mainViews.includes(view) && App.state.viewHistory.length > 0;
    document.getElementById('btn-back').classList.toggle('visible', showBack);

    var titulos = {
      'equipos':           'CB Baeza',
      'gestion':           'Gestion',
      'sesiones':          App.state._equipoNombre || 'Equipo',
      'sesion':            'Asistencia',
      'sesion-guardada':   'Sesi\u00f3n',
      'equipos-admin':     'Equipos',
      'equipo-form':       App.state.formEquipoId ? 'Editar equipo' : 'Nuevo equipo',
      'jugadores-admin':   'Jugadores',
      'jugador-form':      App.state.formJugadorId ? 'Editar jugador' : 'Nuevo jugador',
      'entrenadores-admin':'Entrenadores',
      'entrenador-form':   App.state.formEntrenadorId ? 'Editar entrenador' : 'Nuevo entrenador',
      'historial-equipo':  'Historial',
      'jugador-detalle':   'Perfil',
      'entrenador-detalle':'Perfil',
      'equipo-detalle':    'Equipo',
      'perfil-jugador':          'Mi Perfil',
      'mis-entrenamientos':      'Mis Entrenamientos',
      'detalle-sesion-jugador':  'Sesión',
      'mis-stats':               'Mis Estadísticas',
      'mi-equipo':               'Mi Equipo',
      'ajustes-cuenta':          'Ajustes de Cuenta',
    };
    document.getElementById('header-title').textContent = titulos[view] || 'CB Baeza';

    var fabViews = {'equipos-admin':true,'jugadores-admin':true,'entrenadores-admin':true};
    var fab = document.getElementById('fab-btn');
    if (fabViews[view]) {
      if ((view === 'entrenadores-admin' || view === 'equipos-admin') && !App.state.esAdmin) fab.classList.add('hidden');
      else fab.classList.remove('hidden');
    } else {
      fab.classList.add('hidden');
    }

    var _editViews = {'jugador-detalle':true,'entrenador-detalle':true,'equipo-detalle':true};
    var _btnEdit   = document.getElementById('btn-edit');
    var _userBadge = document.getElementById('user-badge');
    if (_editViews[view]) {
      var isEntDetalleAjeno = (view === 'entrenador-detalle' && !App.state.esAdmin && App.state.usuario && App.state.usuario.ID !== App.state.detalleEntrenadorId);
      var isEqDetalleAjeno  = (view === 'equipo-detalle' && !App.state.esAdmin && !App.state.equipos.some(function(e) { return e.ID === App.state.detalleEquipoId; }));
      if (isEntDetalleAjeno || isEqDetalleAjeno) _btnEdit.classList.add('hidden');
      else _btnEdit.classList.remove('hidden');
      _userBadge.classList.add('hidden');
    } else {
      _btnEdit.classList.add('hidden');
      _userBadge.classList.remove('hidden');
    }

    // Ocultar controles de administración para el rol jugador
    if (App.state.rol === 'jugador') {
      fab.classList.add('hidden');
      _btnEdit.classList.add('hidden');
    }

    if (App.views[view] && App.views[view].render) App.views[view].render(params || {});
  },

  goBack() {
    var _dirtyViews = ['equipo-form', 'jugador-form', 'entrenador-form', 'sesion', 'ajustes-cuenta'];
    if (_dirtyViews.indexOf(App.state.currentView) >= 0 && App.state._formIsDirty) {
      App.openModal('Cambios sin guardar',
        '<div class="modal-confirm-warning" style="padding:20px 16px 16px;text-align:center">' +
        '<div class="modal-confirm-icon">&#x26A0;</div>' +
        '<div class="modal-confirm-msg">¿Salir sin guardar?<br><br>Los cambios realizados se perderán.</div>' +
        '<div style="display:flex;gap:8px;margin-top:20px">' +
        '<button class="btn btn-secondary" style="flex:1" onclick="App.closeModal()">Seguir editando</button>' +
        '<button class="btn btn-destructive" style="flex:1" onclick="App.state._formIsDirty=false;App.closeModal();App._goBackReal()">Salir sin guardar</button>' +
        '</div></div>'
      );
      return;
    }
    App._goBackReal();
  },

  _goBackReal() {
    var prev = App.state.viewHistory.pop();
    if (prev) App.navigate(prev, {}, false);
  },

  editarDetalle() {
    var v = App.state.currentView;
    if      (v === 'jugador-detalle')    App.views['jugador-form'].cargar(App.state.detalleJugadorId);
    else if (v === 'entrenador-detalle') App.views['entrenador-form'].cargar(App.state.detalleEntrenadorId);
    else if (v === 'equipo-detalle')     App.views['equipo-form'].cargar(App.state.detalleEquipoId);
  },

  fabAction() {
    var acciones = {
      // Para equipo nuevo: resetear estado ANTES de navegar para que render()
      // no mezcle datos de una edición anterior.
      'equipos-admin':      function() { App.state.formEquipoId = null; App.views['equipo-form']._reset(); App.navigate('equipo-form'); },
      'jugadores-admin':    function() { App.state.formJugadorId = null; App.navigate('jugador-form'); },
      'entrenadores-admin': function() { App.state.formEntrenadorId = null; App.navigate('entrenador-form'); },
    };
    if (acciones[App.state.currentView]) acciones[App.state.currentView]();
  },

  openModal(title, bodyHtml) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = bodyHtml;
    document.getElementById('modal-overlay').classList.add('open');
  },

  closeModal(e) {
    if (!e || e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.remove('open');
    }
  },

  closeModalJustif(e) {
    if (!e || e.target === document.getElementById('modal-justificacion')) {
      document.getElementById('modal-justificacion').classList.add('hidden');
    }
  },

  // ==============================================================
  views: {

    // -- Tab Equipos ----------------------------------------
    equipos: {
      render: function() {
        var lista = document.getElementById('equipos-lista');
        var equipos;
        if (App.state.esAdmin) {
          equipos = App.cache.equipos;
        } else {
          // Combinar equipos principales + equipos de solo lectura (Visor)
          var mainIds = new Set(App.state.equipos.map(function(e) { return e.ID; }));
          equipos = App.state.equipos.slice();
          (App.state.equiposVisor || []).forEach(function(eq) {
            if (!mainIds.has(eq.ID)) equipos.push(eq);
          });
        }
        if (!equipos.length) {
          lista.innerHTML = '<div class="empty-state"><div class="ei">&#x1F3C0;</div><p>No tienes equipos asignados.</p></div>';
          return;
        }
        var hoy = _hoy();
        var mainEqIds = new Set(App.state.equipos.map(function(e) { return e.ID; }));
        lista.innerHTML = equipos.map(function(eq) {
          // Mini-stats de la última sesión registrada
          var sesiones = App.cache.getSesionesByEquipo(eq.ID);
          var ultimaGuardada = null;
          for (var i = sesiones.length - 1; i >= 0; i--) {
            if (sesiones[i].Fecha < hoy && (sesiones[i].AsistenciaGuardada === true || sesiones[i].AsistenciaGuardada === 'TRUE')) {
              ultimaGuardada = sesiones[i]; break;
            }
          }
          var statsHtml = '';
          if (ultimaGuardada) {
            var rs = App.cache.asistJugadores.filter(function(r) { return r.ID_Sesion === ultimaGuardada.ID; });
            if (rs.length) {
              var cP = rs.filter(function(r) { return r.Estado === 'P'; }).length;
              var cA = rs.filter(function(r) { return r.Estado === 'A'; }).length;
              var cR = rs.filter(function(r) { return r.Estado === 'R'; }).length;
              statsHtml = '<div class="eq-stats">' +
                (cP ? '<span class="eq-stat-chip p"><span class="dot"></span>' + cP + '</span>' : '') +
                (cA ? '<span class="eq-stat-chip a"><span class="dot"></span>' + cA + '</span>' : '') +
                (cR ? '<span class="eq-stat-chip r"><span class="dot"></span>' + cR + '</span>' : '') +
                '</div>';
            }
          }
          // Chip Visor: el equipo es de solo lectura
          var esVisor = !App.state.esAdmin && !mainEqIds.has(eq.ID);
          var visorHtml = esVisor ? '<span class="chip-visor">&#x1F441; Visor</span>' : '';
          return '<div class="equipo-card" onclick="App.views.equipos.abrirEquipo(\'' + eq.ID + '\',\'' + _esc(eq.Nombre) + '\')">' +
            '<div class="eq-icon">&#x1F3C0;</div>' +

            statsHtml + '</div>' +
            visorHtml + '<div class="eq-arrow">&#x203A;</div></div>';
        }).join('');
        // Botón de sustitución puntual (solo entrenadores, no jugadores ni admins)
        if (App.state.rol === 'entrenador') {
          lista.innerHTML += '<div style="padding:12px 0 4px"><button class="btn btn-secondary btn-full" onclick="App.views.equipos.abrirSustituto()">&#x1F501; Sustituir en otro equipo</button></div>';

    // -- Sesiones de equipo ---------------------------------
    sesiones: {
      render: function() {
        var id = App.state.equipoSesionesId;
        if (!id) return;
        var eq = App.cache.getEquipoById(id);
        document.getElementById('sesiones-equipo-hdr').innerHTML =
          '<h2>' + (App.state._equipoNombre || 'Equipo') + '</h2>' +
          '<div class="sesiones-desc">Registro de asistencia a entrenamientos</div>';
        // 5d-1: mostrar subtítulo informativo

        if (sub) sub.style.display = '';

      _renderListas: function(sesiones) {
        var hoy = _hoy();
        var prox        = sesiones.filter(function(s) { return s.Fecha >= hoy; }).reverse();
        var todasPasadas = sesiones.filter(function(s) { return s.Fecha < hoy; });
        var pasadas      = todasPasadas.slice(-10).reverse();

        // Pre-computar stats desde caché para sesiones ya guardadas
        sesiones.forEach(function(s) {
          var guardada = s.AsistenciaGuardada === true || s.AsistenciaGuardada === 'TRUE';
          if (guardada && !s._statsJug) {
            var rs = App.cache.asistJugadores.filter(function(r) { return r.ID_Sesion === s.ID; });
            if (rs.length) {
              s._statsJug = {
                P: rs.filter(function(r) { return r.Estado === 'P'; }).length,
                A: rs.filter(function(r) { return r.Estado === 'A'; }).length,
                R: rs.filter(function(r) { return r.Estado === 'R'; }).length
              };
            }
          }
        });

        function htmlSesion(s) {
          // Tarjeta placeholder mientras se crea la sesión en el servidor
          if (s._loading) {
            var fl = _fmtFecha(s.Fecha);
            return '<div class="sesion-card" style="opacity:0.5;pointer-events:none">' +
              '<div class="sc-fecha"><div class="dia">' + fl.d + '</div><div class="mes">' + fl.m + '</div></div>' +
              '<div class="sc-info" style="flex:1"><div class="dia-n">' + fl.dn + '</div>' +
              '<div class="hora">' + s.HoraInicio + '&ndash;' + s.HoraFin + '</div></div>' +
              '<span class="sc-status-badge" style="background:var(--texto-sec);animation:pulse 1.2s ease-in-out infinite alternate">Creando\u2026</span>' +
              '</div>';
          }
          var f = _fmtFecha(s.Fecha);
          var extra = (s.EsExtra === true || s.EsExtra === 'TRUE') ? '<span class="badge-extra">Extra</span>' : '';
          var badgeHtml = '';
          var statsHtml = '';
          var sinRegistrar = '';
          var guardada = s.AsistenciaGuardada === true || s.AsistenciaGuardada === 'TRUE' || s._asistRegistrada;
          if (guardada) {
            badgeHtml = '<span class="sc-status-badge registrada">Registrada</span>';
            if (s._statsJug) {
              statsHtml = '<div class="sc-stats">&#10003;' + s._statsJug.P + ' &middot; &#10007;' + s._statsJug.A +
                (s._statsJug.R ? ' &middot; &#8987;' + s._statsJug.R : '') + '</div>';
            }
          } else if (s.Fecha < hoy) {
            badgeHtml = '<span class="sc-status-badge pendiente">!</span>';
            sinRegistrar = ' sin-registrar';
          }
          return '<div class="sesion-card' + sinRegistrar + '" onclick="App.views.sesiones.abrirSesion(\'' + s.ID + '\')">' +
            '<div class="sc-fecha"><div class="dia">' + f.d + '</div><div class="mes">' + f.m + '</div></div>' +
            '<div class="sc-info" style="flex:1"><div class="dia-n">' + f.dn + '</div>' +
            '<div class="hora">' + s.HoraInicio + '&ndash;' + s.HoraFin + '</div>' +
            statsHtml + '</div>' +
            badgeHtml + extra + '</div>';
        }

        document.getElementById('sesiones-proximas').innerHTML = prox.length
          ? prox.map(htmlSesion).join('')
          : '<div class="empty-state" style="padding:24px"><p>Sin sesiones proximas. Pulsa &quot;+ Semana&quot;.</p></div>';

        var pasadasHtml = pasadas.length
          ? pasadas.map(htmlSesion).join('')
          : '<div style="padding:12px 16px;font-size:.8rem;color:var(--texto-sec)">Sin sesiones anteriores</div>';
        if (todasPasadas.length > 10) {
          pasadasHtml += '<button class="btn btn-secondary btn-full btn-sm" style="margin:12px 16px;width:calc(100% - 32px)" onclick="App.navigate(\'historial-equipo\')">Ver historial completo \u2192</button>';
        }
        document.getElementById('sesiones-pasadas').innerHTML = pasadasHtml;
      },

      abrirSesion: function(sesionId) {
        var sesion = App.cache.sesiones.find(function(s) { return s.ID === sesionId; });
        App.state.sesionId = sesionId;
        var guardada = sesion && (sesion.AsistenciaGuardada === true || sesion.AsistenciaGuardada === 'TRUE' || sesion._asistRegistrada);
        App.navigate(guardada ? 'sesion-guardada' : 'sesion');
      },

      generarSemana: function() {
        var id = App.state.equipoSesionesId;
        var horarios = App.cache.getHorariosByEquipo(id);
        if (!horarios.length) { showToast('El equipo no tiene horario configurado', 'error'); return; }

        // Calcular lunes de la semana actual (local, mismo criterio que _hoy())
        var hoyDate = new Date();
        var dow = hoyDate.getDay(); // 0=Dom, 1=Lun … 6=Sab
        var diffToLunes = (dow === 0) ? -6 : 1 - dow;
        var lunesDate = new Date(hoyDate.getFullYear(), hoyDate.getMonth(), hoyDate.getDate() + diffToLunes);

        // Añadir placeholders para cada entrada del horario
        var tempIds = [];
        horarios.forEach(function(h) {
          var sesDate = new Date(lunesDate.getFullYear(), lunesDate.getMonth(), lunesDate.getDate() + Number(h.DiaSemana) - 1);
          var fechaStr = sesDate.getFullYear() + '-' + String(sesDate.getMonth()+1).padStart(2,'0') + '-' + String(sesDate.getDate()).padStart(2,'0');
          var yaExiste = App.cache.sesiones.some(function(s) { return s.ID_Equipo === id && s.Fecha === fechaStr && s.HoraInicio === h.HoraInicio; });
          if (!yaExiste) {
            var tempId = '__tmp_sem_' + h.DiaSemana;
            tempIds.push(tempId);
            App.cache.sesiones.push({ ID: tempId, ID_Equipo: id, Fecha: fechaStr, HoraInicio: h.HoraInicio, HoraFin: h.HoraFin, EsExtra: false, _loading: true });
          }
        });
        App.views.sesiones.render();

        server('generarSesionesSemana', id)
          .then(function(res) {
            App.cache.sesiones = App.cache.sesiones.filter(function(s) { return tempIds.indexOf(s.ID) < 0; });
            if (!res.success) { showToast(res.error, 'error'); App.views.sesiones.render(); return; }
            var creadas = res.sesiones && res.sesiones.creadas ? res.sesiones.creadas : [];
            creadas.forEach(function(s) { App.cache.upsert('sesiones', s); });
            showToast('Creadas ' + creadas.length + ' sesiones', 'success');
            App.views.sesiones.render();
          })
          .catch(function() {
            App.cache.sesiones = App.cache.sesiones.filter(function(s) { return tempIds.indexOf(s.ID) < 0; });
            showToast('Error al generar sesiones', 'error');
            App.views.sesiones.render();
          });
      },

      abrirExtra: function() {
        App.openModal('Nueva sesion extra',
          '<div style="padding:16px">' +
          '<div class="form-group"><label>Fecha</label><input type="date" id="ext-fecha" value="' + _hoy() + '"></div>' +
          '<div class="form-row">' +
          '<div class="form-group"><label>Inicio</label><input type="time" id="ext-inicio" value="18:00"></div>' +
          '<div class="form-group"><label>Fin</label><input type="time" id="ext-fin" value="19:30"></div>' +
          '</div>' +
          '<div class="form-group"><label>Notas</label><input type="text" id="ext-notas" placeholder="Opcional..."></div>' +
          '<div style="display:flex;gap:8px;margin-top:8px">' +
          '<button class="btn btn-secondary" style="flex:1" onclick="App.closeModal()">Cancelar</button>' +
          '<button class="btn btn-primary" style="flex:1" onclick="App.views.sesiones._guardarExtra()">Crear</button>' +
          '</div></div>');
      },

      _guardarExtra: function() {
        var datos = {
          Fecha:      document.getElementById('ext-fecha').value,
          HoraInicio: document.getElementById('ext-inicio').value,
          HoraFin:    document.getElementById('ext-fin').value,
          Notas:      document.getElementById('ext-notas').value,
        };
        if (!datos.Fecha || !datos.HoraInicio || !datos.HoraFin) {
          showToast('Fecha y horas son obligatorias', 'error'); return;
        }
        App.closeModal();

        // Añadir tarjeta placeholder al listado inmediatamente
        var tempId = '__tmp_' + Date.now();
        App.cache.sesiones.push({
          ID: tempId,
          ID_Equipo: App.state.equipoSesionesId,
          Fecha: datos.Fecha,
          HoraInicio: datos.HoraInicio,
          HoraFin: datos.HoraFin,
          Notas: datos.Notas || '',
          EsExtra: true,
          _loading: true,
        });
        App.views.sesiones.render();

        App.sync.run('crearSesionExtra', [App.state.equipoSesionesId, datos], function() {
          // Rollback: eliminar placeholder
          App.cache.sesiones = App.cache.sesiones.filter(function(s) { return s.ID !== tempId; });
          App.views.sesiones.render();
        }).then(function(res) {
          App.cache.sesiones = App.cache.sesiones.filter(function(s) { return s.ID !== tempId; });
          if (res && res.success && res.sesion) {
            App.cache.upsert('sesiones', res.sesion);
            showToast('Sesión creada', 'success');
          }
          App.views.sesiones.render();
        });
      },
    },

    // -- Asistencia de sesion -------------------------------
    sesion: {
      render: function() {
        var id = App.state.sesionId;
        if (!id) return;
        // Construir 100% desde cache — sin llamada al servidor
        var sesion = App.cache.sesiones.find(function(s) { return s.ID === id; });
        if (!sesion) { showToast('Sesión no encontrada', 'error'); return; }
        App.views.sesion._render(App.views.sesion._buildFromCache(sesion));
      },

      // Construye el objeto asistencia completo desde App.cache sin tocar el servidor.
      _buildFromCache: function(sesion) {
        var sesionId = sesion.ID;

        // ── Jugadores ────────────────────────────────────────────────────────
        var jugEquipo    = App.cache.getJugadoresByEquipo(sesion.ID_Equipo);
        var registrosJug = App.cache.asistJugadores.filter(function(r) { return r.ID_Sesion === sesionId; });
        var mapaJug = {};
        registrosJug.forEach(function(r) { mapaJug[r.ID_Jugador] = r; });
        var idsEquipo = new Set(jugEquipo.map(function(j) { return j.ID; }));
        var invitadosJug = registrosJug
          .filter(function(r) { return (r.EsInvitado === true || r.EsInvitado === 'TRUE') && !idsEquipo.has(r.ID_Jugador); })
          .map(function(r) { return App.cache.jugadores.find(function(j) { return j.ID === r.ID_Jugador; }) || null; })
          .filter(Boolean);
        var jugConEstado = jugEquipo.concat(invitadosJug).map(function(j) {
          var reg = mapaJug[j.ID];
          return {
            jugador: j,
            estado: reg ? reg.Estado : null,
            esInvitado: !!reg && (reg.EsInvitado === true || reg.EsInvitado === 'TRUE'),
            tieneJustif: !!(reg && (reg.TieneJustificacion === true || reg.TieneJustificacion === 'TRUE')),
            tipoJustif: reg ? (reg.TipoJustificacion || '') : '',
            motivoJustif: reg ? (reg.MotivoCategoria || '') : '',
          };
        });

        // ── Entrenadores ─────────────────────────────────────────────────────
        var entEquipo    = App.cache.getEntrenadoresByEquipo(sesion.ID_Equipo);
        var registrosEnt = App.cache.asistEntrenadores.filter(function(r) { return r.ID_Sesion === sesionId; });
        var mapaEnt = {};
        registrosEnt.forEach(function(r) { mapaEnt[r.ID_Entrenador] = r; });
        var idsEntEquipo = new Set(entEquipo.map(function(e) { return e.ID; }));
        var invitadosEnt = registrosEnt
          .filter(function(r) { return (r.EsInvitado === true || r.EsInvitado === 'TRUE') && !idsEntEquipo.has(r.ID_Entrenador); })
          .map(function(r) { return App.cache.entrenadores.find(function(e) { return e.ID === r.ID_Entrenador; }) || null; })
          .filter(Boolean);
        var entConEstado = entEquipo.concat(invitadosEnt).map(function(e) {
          var reg = mapaEnt[e.ID];
          return { entrenador: e, asistio: reg ? (reg.Asistio === true || reg.Asistio === 'TRUE') : null, esInvitado: !!reg && (reg.EsInvitado === true || reg.EsInvitado === 'TRUE') };
        });

        return { sesion: sesion, jugadores: jugConEstado, entrenadores: entConEstado };
      },

      _render: function(asistencia) {
        var sesion = asistencia.sesion;
        var jugadores = asistencia.jugadores || [];
        var entrenadores = asistencia.entrenadores || [];

        var f = _fmtFecha(sesion.Fecha);
        var extra = (sesion.EsExtra === true || sesion.EsExtra === 'TRUE') ? ' &middot; <strong>Extra</strong>' : '';
        document.getElementById('sesion-hdr').innerHTML =
          '<h2>' + f.dn + ', ' + f.d + ' de ' + f.ml + '</h2>' +
          '<div class="vh-sub">' + sesion.HoraInicio + '&ndash;' + sesion.HoraFin + extra + '</div>' +
          (sesion.Notas ? '<div class="vh-horario">' + sesion.Notas + '</div>' : '');

        document.getElementById('sesion-jugs').innerHTML = jugadores.length
          ? jugadores.map(function(item) {
              var j = item.jugador; var estado = item.estado || ''; var inv = item.esInvitado;
              return '<div class="jug-card ' + estado + '" data-id="' + j.ID + '" data-estado="' + estado + '" data-inv="' + inv + '" onclick="App.views.sesion.toggleEstado(this)">' +
                '<div class="jug-dorsal">' + (j.Dorsal || '-') + '</div>' +
                '<div style="flex:1;min-width:0"><div class="jug-nombre">' + j.Apellidos + ', ' + j.Nombre + '</div>' +
                '<div class="jug-tipo">' + (inv ? 'Invitado' : (j.Tipo || '')) + '</div>' +
                (item.tieneJustif ? '<div class="jug-justif-aviso">\u26a0\ufe0f ' + (item.tipoJustif || 'Justif.') + (item.motivoJustif ? ': ' + _esc(item.motivoJustif) : '') + '</div>' : '') +
                '</div>' +
                '<div class="estado-chip">' + _iconEstado(estado) + '</div></div>';
            }).join('')
          : '<div class="empty-state" style="padding:20px"><p>Sin jugadores asignados</p></div>';

        document.getElementById('sesion-ents').innerHTML = entrenadores.length
          ? entrenadores.map(function(item) {
              var e = item.entrenador; var asistio = item.asistio; var inv = item.esInvitado;
              return '<div class="ent-row" data-id="' + e.ID + '" data-inv="' + inv + '">' +
                '<div><div class="ent-nombre">' + e.Apellidos + ', ' + e.Nombre + '</div>' +
                '<div class="ent-sub">' + (inv ? 'Invitado' : '') + '</div></div>' +
                '<label class="toggle-sw"><input type="checkbox" ' + (asistio ? 'checked' : '') + ' onchange="App.state._formIsDirty=true">' +
                '<div class="toggle-sl"></div></label></div>';
            }).join('')
          : '<div class="empty-state" style="padding:20px"><p>Sin entrenadores asignados</p></div>';
        App.state._formIsDirty = false;
        App.views.sesion._startAutoSave();
      },

      toggleEstado: function(card) {
        var ciclo = {'':'P','P':'A','A':'R','R':'P'};
        var sig = ciclo[card.dataset.estado || ''];
        card.dataset.estado = sig;
        card.className = 'jug-card ' + sig;
        card.querySelector('.estado-chip').textContent = _iconEstado(sig);
        App.state._formIsDirty = true;
      },

      guardar: function() {
        var sesionId = App.state.sesionId;
        var jugadores = [];
        document.querySelectorAll('#sesion-jugs .jug-card').forEach(function(c) {
          if (c.dataset.estado) jugadores.push({jugadorId:c.dataset.id, estado:c.dataset.estado, esInvitado:c.dataset.inv==='true'});
        });
        var entrenadores = [];
        document.querySelectorAll('#sesion-ents .ent-row').forEach(function(c) {
          entrenadores.push({entrenadorId:c.dataset.id, asistio:c.querySelector('input[type="checkbox"]').checked, esInvitado:c.dataset.inv==='true'});
        });

        var hayEntAsistido = entrenadores.some(function(e) { return e.asistio; });
        if (!hayEntAsistido) {
          showToast('Debe haber al menos un entrenador con asistencia registrada', 'error');
          return;
        }

        // Backup para rollback si el servidor falla
        var jugBackup = App.cache.asistJugadores.filter(function(r) { return r.ID_Sesion === sesionId; });
        var entBackup = App.cache.asistEntrenadores.filter(function(r) { return r.ID_Sesion === sesionId; });
        var sesionObj = App.cache.sesiones.find(function(s) { return s.ID === sesionId; });
        var sesionBackup = sesionObj ? Object.assign({}, sesionObj) : null;

        // Actualizar caché de forma optimista
        App.cache.asistJugadores = App.cache.asistJugadores.filter(function(r) { return r.ID_Sesion !== sesionId; });
        jugadores.forEach(function(j) {
          if (j.estado) App.cache.asistJugadores.push({ ID_Sesion: sesionId, ID_Jugador: j.jugadorId, Estado: j.estado, EsInvitado: j.esInvitado });
        });
        App.cache.asistEntrenadores = App.cache.asistEntrenadores.filter(function(r) { return r.ID_Sesion !== sesionId; });
        entrenadores.forEach(function(e) {
          App.cache.asistEntrenadores.push({ ID_Sesion: sesionId, ID_Entrenador: e.entrenadorId, Asistio: e.asistio, EsInvitado: e.esInvitado });
        });
        if (sesionObj) {
          var countP = 0, countA = 0, countR = 0;
          jugadores.forEach(function(j) {
            if (j.estado === 'P') countP++;
            else if (j.estado === 'A') countA++;
            else if (j.estado === 'R') countR++;
          });
          sesionObj.AsistenciaGuardada = true;
          sesionObj._asistRegistrada = true;
          sesionObj._statsJug = { P: countP, A: countA, R: countR };
          sesionObj._statsEnt = entrenadores.filter(function(e) { return e.asistio; }).length;
        }

        // Navegar al listado inmediatamente, sin esperar al servidor
        App.state._formIsDirty = false;
        App.state.sesionId = null;
        App.views.sesion._stopAutoSave();
        showToast('Asistencia guardada', 'success');
        var _hIdx = App.state.viewHistory.lastIndexOf('sesiones');
        App.state.viewHistory = _hIdx >= 0 ? App.state.viewHistory.slice(0, _hIdx) : App.state.viewHistory.filter(function(v) { return v !== 'sesion'; });
        App.navigate('sesiones', null, false);

        // Sincronizar con el servidor en segundo plano
        App.sync.run('guardarAsistenciaCompleta', [sesionId, {jugadores:jugadores, entrenadores:entrenadores}], function() {
          // Rollback si el servidor falla
          App.cache.asistJugadores = App.cache.asistJugadores.filter(function(r) { return r.ID_Sesion !== sesionId; });
          jugBackup.forEach(function(r) { App.cache.asistJugadores.push(r); });
          App.cache.asistEntrenadores = App.cache.asistEntrenadores.filter(function(r) { return r.ID_Sesion !== sesionId; });
          entBackup.forEach(function(r) { App.cache.asistEntrenadores.push(r); });
          if (sesionObj && sesionBackup) Object.assign(sesionObj, sesionBackup);
        });
      },

      _startAutoSave: function() {
        App.views.sesion._stopAutoSave();
        App.state._sesionAutoSaveTimer = setInterval(function() {
          if (App.state.currentView === 'sesion' && App.state._formIsDirty) {
            App.views.sesion._autoGuardar();
          }
        }, 5000);
      },
      _stopAutoSave: function() {
        if (App.state._sesionAutoSaveTimer) {
          clearInterval(App.state._sesionAutoSaveTimer);
          App.state._sesionAutoSaveTimer = null;
        }
      },
      _actualizarTs: function() {
        var ts = document.getElementById('sesion-autosave-ts');
        if (!ts) return;
        var n = new Date();
        ts.textContent = 'Guardado a las ' + n.getHours() + ':' + String(n.getMinutes()).padStart(2, '0');
        ts.style.display = 'block';
      },
      _autoGuardar: function() {
        var sesionId = App.state.sesionId;
        if (!sesionId || App.state.currentView !== 'sesion') return;
        var jugadores = [];
        document.querySelectorAll('#sesion-jugs .jug-card').forEach(function(c) {
          if (c.dataset.estado) jugadores.push({jugadorId:c.dataset.id, estado:c.dataset.estado, esInvitado:c.dataset.inv==='true'});
        });
        var entrenadores = [];
        document.querySelectorAll('#sesion-ents .ent-row').forEach(function(c) {
          entrenadores.push({entrenadorId:c.dataset.id, asistio:c.querySelector('input[type="checkbox"]').checked, esInvitado:c.dataset.inv==='true'});
        });
        if (!entrenadores.some(function(e) { return e.asistio; })) return;
        App.sync.run('guardarAsistenciaCompleta', [sesionId, {jugadores:jugadores, entrenadores:entrenadores}])
          .then(function(res) {
            if (!res || !res.success) return;
            App.cache.asistJugadores = App.cache.asistJugadores.filter(function(r) { return r.ID_Sesion !== sesionId; });
            jugadores.forEach(function(j) {
              if (j.estado) App.cache.asistJugadores.push({ ID_Sesion: sesionId, ID_Jugador: j.jugadorId, Estado: j.estado, EsInvitado: j.esInvitado });
            });
            App.cache.asistEntrenadores = App.cache.asistEntrenadores.filter(function(r) { return r.ID_Sesion !== sesionId; });
            entrenadores.forEach(function(e) {
              App.cache.asistEntrenadores.push({ ID_Sesion: sesionId, ID_Entrenador: e.entrenadorId, Asistio: e.asistio, EsInvitado: e.esInvitado });
            });
            var countP = 0, countA = 0, countR = 0;
            jugadores.forEach(function(j) {
              if (j.estado === 'P') countP++;
              else if (j.estado === 'A') countA++;
              else if (j.estado === 'R') countR++;
            });
            var sesionObj = App.cache.sesiones.find(function(s) { return s.ID === sesionId; });
            if (sesionObj) {
              sesionObj.AsistenciaGuardada = true;
              sesionObj._asistRegistrada = true;
              sesionObj._statsJug = { P: countP, A: countA, R: countR };
              sesionObj._statsEnt = entrenadores.filter(function(e) { return e.asistio; }).length;
            }
            App.state._formIsDirty = false;
            App.views.sesion._actualizarTs();
          });
      },

      buscarInvitadoEnt: function() { App.views.sesion._abrirBuscador('entrenador'); },

      _abrirBuscador: function(tipo) {
        var items = tipo === 'jugador' ? App.cache.jugadores : App.cache.entrenadores;
        var selector = tipo === 'jugador' ? '#sesion-jugs .jug-card' : '#sesion-ents .ent-row';
        var idsActuales = new Set([].slice.call(document.querySelectorAll(selector)).map(function(c) { return c.dataset.id; }));
        var disponibles = items.filter(function(i) { return !idsActuales.has(i.ID); });
        App.state._buscadorTipo = tipo;
        App.state._buscadorItems = disponibles;

      _htmlBuscador: function(items) {
        return '<div class="search-wrap"><input type="search" placeholder="Buscar..." oninput="App.views.sesion._filtrarBuscador(this.value)"></div>' +
          '<div id="buscador-lista">' + items.map(function(i) { return App.views.sesion._htmlBuscadorItem(i); }).join('') + '</div>';
      },

      _htmlBuscadorItem: function(i) {
        var ini = (i.Nombre ? i.Nombre[0] : '') + (i.Apellidos ? i.Apellidos[0] : '');
        var sub = i.Dorsal ? 'Dorsal ' + i.Dorsal : (i.Email || '');

          '<div class="sr-sub">' + sub + '</div></div></div>';

      _filtrarBuscador: function(q) {
        var lower = q.toLowerCase();
        var filtrados = (App.state._buscadorItems || []).filter(function(i) {
          return String((i.Nombre||'') + ' ' + (i.Apellidos||'')).toLowerCase().indexOf(lower) >= 0;

        App.closeModal();
        var tipo = App.state._buscadorTipo;
        if (tipo === 'jugador') {
          var div = document.createElement('div');
          div.className = 'jug-card';
          div.dataset.id = item.ID;
          div.dataset.estado = '';
          div.dataset.inv = 'true';
          div.onclick = function() { App.views.sesion.toggleEstado(this); };
          div.innerHTML = '<div class="jug-dorsal">' + (item.Dorsal || '-') + '</div>' +
            '<div><div class="jug-nombre">' + item.Apellidos + ', ' + item.Nombre + '</div>' +
            '<div class="jug-tipo">Invitado</div></div>' +
            '<div class="estado-chip">?</div>';
          document.getElementById('sesion-jugs').appendChild(div);
        } else {
          var div2 = document.createElement('div');
          div2.className = 'ent-row';
          div2.dataset.id = item.ID;
          div2.dataset.inv = 'true';
          div2.innerHTML = '<div><div class="ent-nombre">' + item.Apellidos + ', ' + item.Nombre + '</div>' +
            '<div class="ent-sub">Invitado</div></div>' +
            '<label class="toggle-sw"><input type="checkbox"><div class="toggle-sl"></div></label>';
          document.getElementById('sesion-ents').appendChild(div2);
        }

      eliminar: function() {
        var sesionId = App.state.sesionId;
        if (!sesionId) return;
        var sesion = App.cache.sesiones.find(function(s) { return s.ID === sesionId; });
        var fecha = sesion ? sesion.Fecha : sesionId;
        App.openModal('Eliminar sesi\u00f3n',
          _htmlConfirmModal('danger',
            '\u00bfSeguro que quieres eliminar la sesi\u00f3n del <strong>' + fecha + '</strong>?',
            'Se eliminar\u00e1n todas las asistencias de esta sesi\u00f3n.',
            "App.views.sesion._confirmarEliminar()"
          )
        );
      },
      _confirmarEliminar: function() {
        var sesionId = App.state.sesionId;
        App.closeModal();
        // OPTIMISTA: guardar backup para rollback
        var sesionBackup = Object.assign({}, App.cache.sesiones.find(function(s) { return s.ID === sesionId; }));
        var asistJugBackup = App.cache.asistJugadores.filter(function(r) { return r.ID_Sesion === sesionId; });
        var asistEntBackup = App.cache.asistEntrenadores.filter(function(r) { return r.ID_Sesion === sesionId; });
        // Limpiar cache y navegar inmediatamente
        App.cache.remove('sesiones', sesionId);
        App.cache.asistJugadores   = App.cache.asistJugadores.filter(function(r) { return r.ID_Sesion !== sesionId; });
        App.cache.asistEntrenadores = App.cache.asistEntrenadores.filter(function(r) { return r.ID_Sesion !== sesionId; });
        App.state._formIsDirty = false;
        App.state.sesionId = null;
        App.views.sesion._stopAutoSave();
        showToast('Sesión eliminada', 'success');
        var _hIdx = App.state.viewHistory.lastIndexOf('sesiones');
        App.state.viewHistory = _hIdx >= 0 ? App.state.viewHistory.slice(0, _hIdx) : App.state.viewHistory.filter(function(v) { return v !== 'sesion'; });
        App.navigate('sesiones', null, false);
        // Eliminar en servidor en segundo plano con rollback si falla
        App.sync.run('eliminarSesion', [sesionId], function() {
          if (sesionBackup && sesionBackup.ID) App.cache.upsert('sesiones', sesionBackup);
          asistJugBackup.forEach(function(r) { App.cache.asistJugadores.push(r); });
          asistEntBackup.forEach(function(r) { App.cache.asistEntrenadores.push(r); });
        });
      },
    },

    gestion: { render: function() {} },

    // ── Helper: orden de categorías de mayor a menor edad ──
    _ORDEN_EDAD: { 'senior': 0, 'junior': 1, 'cadete': 2, 'infantil': 3, 'minibasket': 4, 'pre-minibasket': 5, 'baybasket': 6 },
    _edadIdx: function(cat) {
      var idx = App.views._ORDEN_EDAD[String(cat || '').toLowerCase()];
      return idx !== undefined ? idx : 99;
    },

    // -- Lista equipos (admin) ------------------------------
    'equipos-admin': {
      render: function() {
        var lista = App.cache.equipos;
        if (!lista.length) {
          document.getElementById('equipos-admin-lista').innerHTML =
            '<div class="empty-state"><div class="ei">&#x1F3C6;</div><p>Sin equipos. Pulsa + para crear uno.</p></div>';
          return;
        }
        var misIds = new Set(App.state.equipos.map(function(e) { return e.ID; }));
        // 5b-1: propios primero (por edad), luego el resto (por edad)
        var propios = lista.filter(function(eq) { return misIds.has(eq.ID); })
          .slice().sort(function(a, b) { return App.views._edadIdx(a.Categoria) - App.views._edadIdx(b.Categoria); });
        var resto   = lista.filter(function(eq) { return !misIds.has(eq.ID); })
          .slice().sort(function(a, b) { return App.views._edadIdx(a.Categoria) - App.views._edadIdx(b.Categoria); });
        var ordenados = propios.concat(resto);

        // 5b-2: pre-calcular stats por equipo
        var statsEq = {};
        ordenados.forEach(function(eq) {
          var jugs = App.cache.getJugadoresByEquipo(eq.ID);
          var sesionesTotales = App.cache.getSesionesByEquipo(eq.ID);
          var sesGdas = sesionesTotales.filter(function(s) { return s.AsistenciaGuardada === true || s.AsistenciaGuardada === 'TRUE'; });
          var totalPresencias = 0, totalRegistros = 0;
          sesGdas.forEach(function(s) {
            var rs = App.cache.asistJugadores.filter(function(r) { return r.ID_Sesion === s.ID; });
            totalRegistros += rs.length;
            totalPresencias += rs.filter(function(r) { return r.Estado === 'P'; }).length;
          });
          statsEq[eq.ID] = {
            jugadores: jugs.length,
            sesiones:  sesGdas.length,
            pct:       totalRegistros > 0 ? Math.round(totalPresencias / totalRegistros * 100) : null
          };
        });

        document.getElementById('equipos-admin-lista').innerHTML = ordenados.map(function(eq) {
          var esMio = misIds.has(eq.ID);
          var chipHtml = esMio ? '<span class="chip-mi-equipo">&#x2605; Mi equipo</span>' : '';
          var st = statsEq[eq.ID] || { jugadores: 0, sesiones: 0, pct: null };
          var pctHtml = st.pct !== null
            ? '<div class="eq-pct-bar-wrap"><div class="eq-pct-bar"><div class="eq-pct-fill" style="width:' + st.pct + '%"></div></div>' +
              '<span class="eq-pct-label">' + st.pct + '%</span></div>'
            : '<div style="font-size:.68rem;color:var(--texto-sec);margin-top:4px">Sin sesiones registradas</div>';
          return '<div class="eq-card" onclick="App.views[\'equipo-detalle\'].cargar(\'' + eq.ID + '\')">' +
            '<div class="eq-card-hdr">' +
            '<div class="li-avatar">' + (eq.Nombre ? eq.Nombre[0] : '?') + '</div>' +
            '<div style="flex:1"><div class="li-name">' + eq.Nombre + '</div>' +
            '<div class="li-sub">' + eq.Categoria + ' &middot; ' + eq.Modalidad + '</div></div>' +
            chipHtml + '<div class="li-arrow">&#x203A;</div></div>' +
            '<div class="eq-card-body">' +
            '<div class="eq-card-stats">' +
            '<span class="eq-card-stat"><strong>' + st.jugadores + '</strong> jugadores</span>' +
            '<span class="eq-card-stat"><strong>' + st.sesiones + '</strong> sesiones</span>' +
            '</div>' +
            pctHtml +
            '</div></div>';
        }).join('');
      },
    },

    // -- Form equipo ----------------------------------------
    'equipo-form': {
      render: function() {
        var delZone = document.getElementById('equipo-delete-zone');
        if (delZone) delZone.style.display = App.state.formEquipoId ? '' : 'none';
        // NO llamar _reset() aquí: cuando volvemos desde crear un jugador/entrenador
        // nuevo (goBack), el estado de formJugadores/formEntrenadores debe preservarse.
        // _reset() se llama explícitamente en fabAction() al crear un equipo nuevo.
        App.views['equipo-form']._renderDias();
        App.views['equipo-form']._renderListas();
        // isDirty: attach listeners (asignar oninput garantiza un único listener activo)
        var setDirty = function() { App.state._formIsDirty = true; };
        document.getElementById('eq-nombre').oninput    = setDirty;
        document.getElementById('eq-categoria').onchange = setDirty;
        document.getElementById('eq-modalidad').onchange = setDirty;
      },

      cargar: function(equipoId) {
        App.state.formEquipoId = equipoId;
        App.state._formIsDirty = false;
        var eq = App.cache.getEquipoById(equipoId);
        App.navigate('equipo-form');
        if (eq) {
          document.getElementById('eq-nombre').value    = eq.Nombre    || '';
          document.getElementById('eq-categoria').value = eq.Categoria || 'infantil';
          document.getElementById('eq-modalidad').value = eq.Modalidad || 'Masculino';
          App.state.formDias = {};
          App.cache.getHorariosByEquipo(equipoId).forEach(function(h) {
            App.state.formDias[h.DiaSemana] = { inicio: h.HoraInicio, fin: h.HoraFin };
          });
          App.views['equipo-form']._renderDias();
          App.state.formEntrenadores = App.cache.getEntrenadoresByEquipo(equipoId)
            .map(function(e) { return { ID: e.ID, Nombre: e.Nombre, Apellidos: e.Apellidos }; });
          App.state.formJugadores = App.cache.getJugadoresByEquipo(equipoId)
            .map(function(j) { return { ID: j.ID, Nombre: j.Nombre, Apellidos: j.Apellidos, Dorsal: j.Dorsal, Tipo: j.Tipo }; });
          App.state.formEntOriginales = App.state.formEntrenadores.map(function(e) { return e.ID; });
          App.state.formJugOriginales = App.state.formJugadores.map(function(j) { return j.ID; });
          App.views['equipo-form']._renderListas();
        }
      },

      _reset: function() {
        App.state.formEquipoId      = null;
        App.state._formIsDirty      = false;
        App.state.formEntrenadores  = [];
        App.state.formJugadores     = [];
        App.state.formDias          = {};
        App.state.formEntOriginales = [];
        App.state.formJugOriginales = [];
        document.getElementById('eq-nombre').value = '';
        document.getElementById('eq-categoria').value = 'infantil';
        document.getElementById('eq-modalidad').value = 'Masculino';
        document.querySelectorAll('.dia-chip').forEach(function(c) { c.classList.remove('sel'); });
        document.getElementById('horarios-rows').innerHTML = '';
        App.views['equipo-form']._renderListas();
      },

      toggleDia: function(chip) {
        var dia = Number(chip.dataset.dia);
        if (chip.classList.contains('sel')) {
          chip.classList.remove('sel');
          delete App.state.formDias[dia];
        } else {
          chip.classList.add('sel');
          App.state.formDias[dia] = { inicio: '18:00', fin: '19:30' };
        }
        App.views['equipo-form']._renderDias();
        App.state._formIsDirty = true;
      },

      _renderDias: function() {
        document.querySelectorAll('.dia-chip').forEach(function(chip) {
          chip.classList.toggle('sel', !!App.state.formDias[Number(chip.dataset.dia)]);
        });
        var labels = {1:'Lun',2:'Mar',3:'Mie',4:'Jue',5:'Vie',6:'Sab',7:'Dom'};
        var dias = Object.keys(App.state.formDias).map(Number).sort(function(a,b){return a-b;});
        document.getElementById('horarios-rows').innerHTML = dias.map(function(d) {
          var h = App.state.formDias[d];
          return '<div class="horario-row"><div class="horario-dia">' + labels[d] + '</div>' +
            '<input type="time" value="' + h.inicio + '" onchange="App.views[\'equipo-form\']._setHora(' + d + ',\'inicio\',this.value);App.state._formIsDirty=true">' +
            '<span style="color:var(--texto-sec);font-size:.8rem">&ndash;</span>' +
            '<input type="time" value="' + h.fin + '" onchange="App.views[\'equipo-form\']._setHora(' + d + ',\'fin\',this.value);App.state._formIsDirty=true">' +
            '</div>';
        }).join('');
      },

      _setHora: function(dia, campo, valor) {
        if (App.state.formDias[dia]) App.state.formDias[dia][campo] = valor;
      },

      _renderListas: function() {
        document.getElementById('eq-ents-lista').innerHTML = App.state.formEntrenadores.length
          ? App.state.formEntrenadores.map(function(e) {
              return '<div class="asig-item"><div class="asig-info">' +
                '<div class="asig-nombre">' + e.Apellidos + ', ' + e.Nombre + '</div></div>' +

      _crearNuevo: function(tipo) {
        App.closeModal();
        App.state._volverAEquipoFormDespues = true;
        if (tipo === 'ent') {
          App.state.formEntrenadorId = null;
          App.navigate('entrenador-form');
        } else {
          App.state.formJugadorId = null;
          App.navigate('jugador-form');
        }
      },

      guardar: function(force) {
        var nombreEl = document.getElementById('eq-nombre');
        if (!nombreEl) { showToast('Error: recarga la página (formulario no encontrado)', 'error'); return; }
        var nombre    = nombreEl.value.trim();
        var categoria = document.getElementById('eq-categoria').value;
        var modalidad = document.getElementById('eq-modalidad').value;
        if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }
        if (App.state.formEntrenadores.length === 0) { showToast('Debes asignar al menos un entrenador al equipo', 'error'); return; }

        var horarios = Object.keys(App.state.formDias).map(function(dia) {
          var h = App.state.formDias[dia];
          return {DiaSemana: Number(dia), HoraInicio: h.inicio, HoraFin: h.fin};
        });

        // Validar que hora inicio < hora fin en cada día de entrenamiento
        var horarioInvalido = horarios.find(function(h) { return h.HoraInicio >= h.HoraFin; });
        if (horarioInvalido) { showToast('La hora de inicio debe ser anterior a la hora de fin', 'error'); return; }

        var equipoId = App.state.formEquipoId;
        if (!force) {
          var dup = App.cache.equipos.find(function(eq) {
            return eq.ID !== equipoId && String(eq.Nombre||'').toLowerCase() === nombre.toLowerCase();
          });
          if (dup) {
            App.openModal('Equipo duplicado',
              _htmlWarnModal('Ya existe un equipo llamado <strong>' + nombre + '</strong>.',
                '¿Deseas guardarlo igualmente?', 'Guardar igualmente', "App.closeModal();App.views['equipo-form'].guardar(true)")
            );
            return;
          }
        }

        if (equipoId) {
          // ── EDICIÓN OPTIMISTA ─────────────────────────────────────────────
          // Capturar backup para posible rollback
          var eqAntes = Object.assign({}, App.cache.equipos.find(function(e) { return e.ID === equipoId; }));
          var horAntes = App.cache.horarios.filter(function(h) { return h.ID_Equipo === equipoId; }).map(function(h) { return Object.assign({}, h); });
          var jugRelAntes = App.cache.jugadoresEquipos.filter(function(r) { return r.ID_Equipo === equipoId; }).map(function(r) { return Object.assign({}, r); });
          var entRelAntes = App.cache.entrenadoresEquipos.filter(function(r) { return r.ID_Equipo === equipoId; }).map(function(r) { return Object.assign({}, r); });

          // Actualizar cache inmediatamente
          App.cache.upsert('equipos', { ID: equipoId, Nombre: nombre, Categoria: categoria, Modalidad: modalidad });
          for (var i = 0; i < App.state.equipos.length; i++) {
            if (App.state.equipos[i].ID === equipoId) {
              App.state.equipos[i] = Object.assign({}, App.state.equipos[i], { Nombre: nombre, Categoria: categoria, Modalidad: modalidad });
              break;
            }
          }
          App.cache.horarios = App.cache.horarios.filter(function(h) { return h.ID_Equipo !== equipoId; });
          horarios.forEach(function(h) {
            App.cache.horarios.push({ ID: 'h_' + equipoId + '_' + h.DiaSemana, ID_Equipo: equipoId, DiaSemana: h.DiaSemana, HoraInicio: h.HoraInicio, HoraFin: h.HoraFin });
          });
          App.cache._setRelacionesEquipo(equipoId, App.state.formJugadores, App.state.formEntrenadores);

          showToast('Equipo guardado', 'success');
          App.state._formIsDirty = false;
          var _hIdx = App.state.viewHistory.lastIndexOf('equipos-admin');
          App.state.viewHistory = _hIdx >= 0 ? App.state.viewHistory.slice(0, _hIdx) : App.state.viewHistory.filter(function(v) { return v !== 'equipo-form' && v !== 'equipo-detalle'; });
          App.navigate('equipos-admin', null, false);

          // Sincronizar en segundo plano con rollback si falla
          App.sync.start();
          server('actualizarEquipo', equipoId, { Nombre: nombre, Categoria: categoria, Modalidad: modalidad })
            .then(function(res) {
              if (!res.success) throw new Error(res.error);
              return Promise.all([
                server('setHorariosEquipo', equipoId, horarios),
                App.views['equipo-form']._sincronizarPersonas(equipoId),
              ]);
            })
            .then(function() { App.sync.done(); })
            .catch(function(e) {
              App.sync.done();
              showToast((e && e.message) || 'Error al sincronizar equipo', 'error');
              // Rollback
              if (eqAntes && eqAntes.ID) App.cache.upsert('equipos', eqAntes);
              App.cache.horarios = App.cache.horarios.filter(function(h) { return h.ID_Equipo !== equipoId; });
              horAntes.forEach(function(h) { App.cache.horarios.push(h); });
              App.cache.jugadoresEquipos   = App.cache.jugadoresEquipos.filter(function(r) { return r.ID_Equipo !== equipoId; });
              App.cache.entrenadoresEquipos = App.cache.entrenadoresEquipos.filter(function(r) { return r.ID_Equipo !== equipoId; });
              jugRelAntes.forEach(function(r) { App.cache.jugadoresEquipos.push(r); });
              entRelAntes.forEach(function(r) { App.cache.entrenadoresEquipos.push(r); });
            });

        } else {
          // ── CREACIÓN: esperar solo el ID, luego navegar ───────────────────
          App.sync.start();
          server('crearEquipo', { Nombre: nombre, Categoria: categoria, Modalidad: modalidad })
            .then(function(res) {
              if (!res.success) { App.sync.done(); showToast(res.error || 'Error al crear equipo', 'error'); return; }
              var nuevoId = res.equipo.ID;
              App.state.formEquipoId = nuevoId;
              App.cache.upsert('equipos', res.equipo);
              App.state.equipos.push(res.equipo);
              showToast('Equipo creado', 'success');
              App.state._formIsDirty = false;
              App.state.formEquipoId = null;
              var _hIdx = App.state.viewHistory.lastIndexOf('equipos-admin');
              App.state.viewHistory = _hIdx >= 0 ? App.state.viewHistory.slice(0, _hIdx) : App.state.viewHistory.filter(function(v) { return v !== 'equipo-form'; });
              App.navigate('equipos-admin', null, false);
              // Completar horarios y personas en segundo plano
              Promise.all([
                server('setHorariosEquipo', nuevoId, horarios),
                App.views['equipo-form']._sincronizarPersonas(nuevoId),
              ]).then(function() {
                App.cache.horarios = App.cache.horarios.filter(function(h) { return h.ID_Equipo !== nuevoId; });
                horarios.forEach(function(h) {
                  App.cache.horarios.push({ ID: 'h_' + nuevoId + '_' + h.DiaSemana, ID_Equipo: nuevoId, DiaSemana: h.DiaSemana, HoraInicio: h.HoraInicio, HoraFin: h.HoraFin });
                });
                App.cache._setRelacionesEquipo(nuevoId, App.state.formJugadores, App.state.formEntrenadores);
                App.sync.done();
              }).catch(function() {
                App.sync.done();
                showToast('Equipo creado, pero hubo un error al asignar horarios/jugadores. Edítalo para completar.', 'error');
              });
            })
            .catch(function(e) { App.sync.done(); showToast((e && e.message) || 'Error al crear equipo', 'error'); });
        }
      },

      eliminar: function() {
        var equipoId = App.state.formEquipoId;
        if (!equipoId) return;
        var eq = App.cache.getEquipoById(equipoId);
        var nombre = eq ? eq.Nombre : 'este equipo';
        App.openModal('Eliminar equipo',
          _htmlConfirmModal('danger',
            '\u00bfSeguro que quieres eliminar <strong>' + nombre + '</strong>?',
            'Se eliminar\u00e1n todas sus sesiones, asistencias y horarios. Los jugadores y entrenadores NO se eliminar\u00e1n.',
            "App.views['equipo-form']._confirmarEliminar()"
          )
        );
      },
      _confirmarEliminar: function() {
        var equipoId = App.state.formEquipoId;
        App.closeModal();
        // OPTIMISTA: guardar backup para posible rollback
        var eqBackup      = Object.assign({}, App.cache.equipos.find(function(e) { return e.ID === equipoId; }));
        var sesBackup     = App.cache.sesiones.filter(function(s) { return s.ID_Equipo === equipoId; }).map(function(s) { return Object.assign({}, s); });
        var horBackup     = App.cache.horarios.filter(function(h) { return h.ID_Equipo === equipoId; }).map(function(h) { return Object.assign({}, h); });
        var jugRelBackup  = App.cache.jugadoresEquipos.filter(function(r) { return r.ID_Equipo === equipoId; }).map(function(r) { return Object.assign({}, r); });
        var entRelBackup  = App.cache.entrenadoresEquipos.filter(function(r) { return r.ID_Equipo === equipoId; }).map(function(r) { return Object.assign({}, r); });
        var sesionIds     = sesBackup.map(function(s) { return s.ID; });
        var asistJugBackup = App.cache.asistJugadores.filter(function(r) { return sesionIds.indexOf(r.ID_Sesion) >= 0; });
        var asistEntBackup = App.cache.asistEntrenadores.filter(function(r) { return sesionIds.indexOf(r.ID_Sesion) >= 0; });

        // Limpiar cache y navegar a la lista inmediatamente
        App.cache.sesiones = App.cache.sesiones.filter(function(s) { return s.ID_Equipo !== equipoId; });
        App.cache.asistJugadores   = App.cache.asistJugadores.filter(function(r) { return sesionIds.indexOf(r.ID_Sesion) < 0; });
        App.cache.asistEntrenadores = App.cache.asistEntrenadores.filter(function(r) { return sesionIds.indexOf(r.ID_Sesion) < 0; });
        App.cache.horarios = App.cache.horarios.filter(function(h) { return h.ID_Equipo !== equipoId; });
        App.cache.jugadoresEquipos   = App.cache.jugadoresEquipos.filter(function(r) { return r.ID_Equipo !== equipoId; });
        App.cache.entrenadoresEquipos = App.cache.entrenadoresEquipos.filter(function(r) { return r.ID_Equipo !== equipoId; });
        App.cache.remove('equipos', equipoId);
        App.state.equipos = App.state.equipos.filter(function(e) { return e.ID !== equipoId; });
        App.state.formEquipoId = null;
        App.state._formIsDirty = false;
        showToast('Equipo eliminado', 'success');
        // Limpiar historial para no volver a la ficha eliminada
        var _hIdx = App.state.viewHistory.lastIndexOf('equipos-admin');
        App.state.viewHistory = _hIdx >= 0 ? App.state.viewHistory.slice(0, _hIdx) : App.state.viewHistory.filter(function(v) { return v !== 'equipo-form' && v !== 'equipo-detalle'; });
        App.navigate('equipos-admin', {}, false);

        // Eliminar en servidor en segundo plano con rollback si falla
        App.sync.run('eliminarEquipo', [equipoId], function() {
          if (eqBackup && eqBackup.ID) { App.cache.upsert('equipos', eqBackup); App.state.equipos.push(eqBackup); }
          sesBackup.forEach(function(s) { App.cache.upsert('sesiones', s); });
          horBackup.forEach(function(h) { App.cache.horarios.push(h); });
          jugRelBackup.forEach(function(r) { App.cache.jugadoresEquipos.push(r); });
          entRelBackup.forEach(function(r) { App.cache.entrenadoresEquipos.push(r); });
          asistJugBackup.forEach(function(r) { App.cache.asistJugadores.push(r); });
          asistEntBackup.forEach(function(r) { App.cache.asistEntrenadores.push(r); });
        });
      },

      _sincronizarPersonas: function(equipoId) {
        var idsEntAhora = App.state.formEntrenadores.map(function(e) { return e.ID; });
        var idsEntAntes = App.state.formEntOriginales;
        var idsJugAhora = App.state.formJugadores.map(function(j) { return j.ID; });
        var idsJugAntes = App.state.formJugOriginales;
        var promesas = [];

        idsEntAhora.filter(function(id) { return idsEntAntes.indexOf(id) < 0; }).forEach(function(id) {
          promesas.push(server('asignarEntrenadorAEquipo', id, equipoId));
        });
        idsEntAntes.filter(function(id) { return idsEntAhora.indexOf(id) < 0; }).forEach(function(id) {
          promesas.push(server('desasignarEntrenadorDeEquipo', id, equipoId));
        });
        App.state.formJugadores.filter(function(j) { return idsJugAntes.indexOf(j.ID) < 0; }).forEach(function(j) {
          promesas.push(server('asignarJugadorAEquipo', j.ID, equipoId, j.Tipo));
        });
        idsJugAntes.filter(function(id) { return idsJugAhora.indexOf(id) < 0; }).forEach(function(id) {
          promesas.push(server('desasignarJugadorDeEquipo', id, equipoId));
        });

        return Promise.all(promesas).then(function(resultados) {
          var errores = resultados.filter(function(r) { return r && r.success === false; });
          if (errores.length > 0) {
            throw new Error(errores.map(function(r) { return r.error; }).filter(Boolean).join('; '));
          }
        });
      },
    },

    // -- Lista jugadores (admin) ----------------------------
    'jugadores-admin': {
      render: function() {
        App.state._todosJugadores = App.cache.jugadores;
        App.views['jugadores-admin']._render(App.cache.jugadores);
      },
      _render: function(lista) {
        var el = document.getElementById('jugadores-admin-lista');
        if (!lista.length) {
          el.innerHTML = '<div class="empty-state"><div class="ei">&#x1F3C0;</div><p>Sin jugadores registrados</p></div>';
          return;
        }

        // 5c-2/5c-3: construir grupos de equipos en el orden correcto
        var misIds = new Set(App.state.equipos.map(function(e) { return e.ID; }));
        var listaIds = new Set(lista.map(function(j) { return j.ID; }));

        // Calcular stats de asistencia por jugador desde caché
        var statsJug = {};
        lista.forEach(function(j) {
          var rs = App.cache.asistJugadores.filter(function(r) { return r.ID_Jugador === j.ID; });
          var total = rs.length;
          var presentes = rs.filter(function(r) { return r.Estado === 'P'; }).length;
          statsJug[j.ID] = { total: total, presentes: presentes };
        });

        // Determinar equipos con jugadores visibles, ordenados según rol
        var equiposConJug = App.cache.equipos.filter(function(eq) {
          return App.cache.jugadoresEquipos.some(function(r) {
            return r.ID_Equipo === eq.ID && (r.Activo === true || r.Activo === 'TRUE') && listaIds.has(r.ID_Jugador);
          });
        });

        var propios = equiposConJug.filter(function(eq) { return misIds.has(eq.ID); })
          .slice().sort(function(a, b) { return App.views._edadIdx(a.Categoria) - App.views._edadIdx(b.Categoria); });
        var resto   = equiposConJug.filter(function(eq) { return !misIds.has(eq.ID); })
          .slice().sort(function(a, b) { return App.views._edadIdx(a.Categoria) - App.views._edadIdx(b.Categoria); });
        var equiposOrdenados = propios.concat(resto);

        // Jugadores sin equipo asignado
        var conEquipo = new Set();
        App.cache.jugadoresEquipos.forEach(function(r) {
          if (r.Activo === true || r.Activo === 'TRUE') conEquipo.add(r.ID_Jugador);
        });
        var sinEquipo = lista.filter(function(j) { return !conEquipo.has(j.ID); });

        function htmlJugador(j) {
          var ini = (j.Nombre ? j.Nombre[0] : '') + (j.Apellidos ? j.Apellidos[0] : '');
          var st = statsJug[j.ID] || { total: 0, presentes: 0 };
          var pct = st.total > 0 ? Math.round(st.presentes / st.total * 100) : null;
          var colorClass = pct === null ? 'sec' : pct >= 80 ? 'verde' : pct >= 60 ? 'naranja' : 'rojo';
          var statsHtml = pct !== null
            ? '<div class="jug-list-stats"><div class="jls-val ' + colorClass + '">' + pct + '%</div><div class="jls-lab">asist.</div></div>'
            : '<div class="jug-list-stats"><div class="jls-val sec">—</div><div class="jls-lab">sin datos</div></div>';
          return '<div class="list-item" onclick="App.views[\'jugador-detalle\'].cargar(\'' + j.ID + '\')">' +
            '<div class="li-avatar">' + ini + '</div>' +
            '<div style="flex:1"><div class="li-name">' + j.Apellidos + ', ' + j.Nombre + '</div>' +
            '<div class="li-sub">Dorsal ' + (j.Dorsal || '-') + '</div></div>' +
            statsHtml +
            '<div class="li-arrow">&#x203A;</div></div>';
        }

        var html = '';
        equiposOrdenados.forEach(function(eq) {
          var jugsEq = App.cache.jugadoresEquipos
            .filter(function(r) { return r.ID_Equipo === eq.ID && (r.Activo === true || r.Activo === 'TRUE') && listaIds.has(r.ID_Jugador); })
            .map(function(r) { return lista.find(function(j) { return j.ID === r.ID_Jugador; }); })
            .filter(Boolean)
            .sort(function(a, b) { return String(a.Apellidos || '').localeCompare(String(b.Apellidos || '')); });
          if (!jugsEq.length) return;
