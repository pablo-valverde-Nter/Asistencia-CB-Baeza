      guardar: function(force) {
        var _n = document.getElementById('jug-nombre');
        if (!_n) { showToast('Error: recarga la página (formulario no encontrado)', 'error'); return; }
        var datos = {
          Nombre:    _n.value.trim(),
          Apellidos: document.getElementById('jug-apellidos').value.trim(),
          Dorsal:    document.getElementById('jug-dorsal').value,
          FechaNac:  document.getElementById('jug-fechanac').value,
          Telefono:  document.getElementById('jug-tel').value.trim(),
          Email:     document.getElementById('jug-email').value.trim(),
          NombrePadre1: (document.getElementById('jug-padre1-nombre') || {value:''}).value.trim(),
          EmailPadre1:  (document.getElementById('jug-padre1-email')  || {value:''}).value.trim(),
          NombrePadre2: (document.getElementById('jug-padre2-nombre') || {value:''}).value.trim(),
          EmailPadre2:  (document.getElementById('jug-padre2-email')  || {value:''}).value.trim(),
        };
        if (!datos.Nombre || !datos.Apellidos) { showToast('Nombre y apellidos son obligatorios', 'error'); return; }
        if (datos.Email && !_validarEmail(datos.Email)) { showToast('El email no tiene un formato válido', 'error'); return; }
        if (datos.Telefono && !_validarTel(datos.Telefono)) { showToast('El teléfono no tiene un formato válido (mín. 9 dígitos)', 'error'); return; }
        if (datos.FechaNac && datos.FechaNac > _hoy()) { showToast('La fecha de nacimiento no puede ser futura', 'error'); return; }
        if (datos.EmailPadre1 && !_validarEmail(datos.EmailPadre1)) { showToast('El email del padre/madre 1 no es válido', 'error'); return; }
        if (datos.EmailPadre2 && !_validarEmail(datos.EmailPadre2)) { showToast('El email del padre/madre 2 no es válido', 'error'); return; }
        // Credenciales (solo admin al editar)
        var jugId = App.state.formJugadorId;
        var credNuevo = null;
        if (jugId && App.state.esAdmin) {
          var _uEl  = document.getElementById('jug-usuario');
          var _cEl  = document.getElementById('jug-codigo-padres');
          var _pEl  = document.getElementById('jug-pin');
          var _pcEl = document.getElementById('jug-pin-confirm');
          var nuevoUsuario = _uEl  ? _uEl.value.trim()  : '';
          var nuevoCodigo  = _cEl  ? _cEl.value.trim()  : '';
          var nuevoPin     = _pEl  ? _pEl.value.trim()  : '';
          var nuevoPin2    = _pcEl ? _pcEl.value.trim() : '';
          if (nuevoPin || nuevoPin2) {
            if (nuevoPin !== nuevoPin2) { showToast('Los dos PINs no coinciden', 'error'); return; }
            if (!/^[0-9]{4,6}$/.test(nuevoPin)) { showToast('El PIN debe tener entre 4 y 6 dígitos numéricos', 'error'); return; }
          }
          // Detectar si algo cambió
          var jugOrig = App.cache.getJugadorById(jugId) || {};
          var usuarioCambio   = nuevoUsuario && nuevoUsuario !== String(jugOrig.Usuario || '').toLowerCase();
          var codigoCambio    = nuevoCodigo  && nuevoCodigo.toUpperCase() !== String(jugOrig.CodigoPadres || '');
          var pinCambio       = !!nuevoPin;
          if (usuarioCambio || pinCambio || codigoCambio) {
            credNuevo = {
              usuario:  usuarioCambio ? nuevoUsuario : null,
              pin:      pinCambio     ? nuevoPin     : null,
              codigo:   codigoCambio  ? nuevoCodigo  : null,
            };
          }
        }
        // 4f-4: Confirmaci\u00f3n cuando el admin modifica credenciales de un jugador
        if (credNuevo && !App.state._credGuardadoConfirmado) {
          var _forzar = force;
          var _nombreCred = datos.Nombre + ' ' + datos.Apellidos;
          confirmarYGuardar(
            'Modificar credenciales',
            'Se cambiar\u00e1n las credenciales de acceso de <strong>' + _esc(_nombreCred) + '</strong>.' +
            '<br><span style="font-size:.8rem">Aseg\u00farate de comunicarle los nuevos datos.</span>',
            function() { App.state._credGuardadoConfirmado = true; App.views['jugador-form'].guardar(_forzar); }
          );
          return;
        }
        App.state._credGuardadoConfirmado = false;
        if (!force) {
          var dup = App.cache.jugadores.find(function(j) {
            return j.ID !== jugId &&
                   String(j.Nombre || '').toLowerCase() === datos.Nombre.toLowerCase() &&
                   String(j.Apellidos || '').toLowerCase() === datos.Apellidos.toLowerCase();
          });
          if (dup) {
            App.openModal('Jugador duplicado',
              _htmlWarnModal('Ya existe un jugador llamado <strong>' + datos.Nombre + ' ' + datos.Apellidos + '</strong>.',
                '¿Deseas guardarlo igualmente?', 'Guardar igualmente', "App.closeModal();App.views['jugador-form'].guardar(true)")
            );
            return;
          }
        }
        if (jugId) {
          // EDICIÓN OPTIMISTA: actualizar cache y navegar de inmediato, sincronizar en segundo plano
          var original = Object.assign({}, App.cache.getJugadorById(jugId));
          App.cache.upsert('jugadores', Object.assign({ ID: jugId }, datos));
          App.state._todosJugadores = App.cache.jugadores;
          App.state._formIsDirty = false;
          App.state.formJugadorId = null;
          showToast('Jugador actualizado', 'success');
          var _hIdx = App.state.viewHistory.lastIndexOf('jugadores-admin');
          App.state.viewHistory = _hIdx >= 0 ? App.state.viewHistory.slice(0, _hIdx) : App.state.viewHistory.filter(function(v) { return v !== 'jugador-form' && v !== 'jugador-detalle'; });
          App.navigate('jugadores-admin', null, false);
          App.sync.run('actualizarJugador', [jugId, datos], function() {
            App.cache.upsert('jugadores', original);
            App.state._todosJugadores = App.cache.jugadores;
          });
          // Credenciales: llamada extra en segundo plano si algo cambió
          if (credNuevo) {
            App.sync.run('actualizarCredencialesJugador', [jugId, credNuevo.usuario, credNuevo.pin, credNuevo.codigo], null);
          }
        } else {
          // CREACIÓN: esperar ID del servidor, indicador no bloqueante
          showToast('Creando jugador\u2026', '');
          App.sync.start();
          server('crearJugador', datos)
            .then(function(res) {
              App.sync.done();
              var volverEquipo = App.state._volverAEquipoFormDespues;
              App.state._volverAEquipoFormDespues = false;
              if (!res.success) { showToast(res.error, 'error'); return; }
              if (res.jugador) App.cache.upsert('jugadores', res.jugador);
              App.state._todosJugadores = App.cache.jugadores;
              showToast('Jugador creado', 'success');
              // Mostrar credenciales generadas automáticamente
              if (res.jugador && res.jugador.Usuario) {
                setTimeout(function() {
                  App.openModal('Credenciales del jugador',
                    '<div style="padding:20px 16px">' +
                    '<p style="margin-bottom:12px;font-size:.88rem;color:var(--texto-sec)">Comparte estas credenciales con el jugador y su familia:</p>' +
                    '<div class="form-group"><label>Usuario</label><input type="text" class="form-control" readonly value="' + _esc(res.jugador.Usuario) + '"></div>' +
                    '<div class="form-group"><label>Código familias</label><input type="text" class="form-control" readonly value="' + _esc(res.jugador.CodigoPadres || '') + '" style="letter-spacing:4px;font-weight:700"></div>' +
                    '<div class="form-group"><label>PIN inicial</label><input type="text" class="form-control" readonly value="' + _esc(res.jugador.PIN || '') + '" style="letter-spacing:4px;font-weight:700;font-size:1.1rem"></div>' +
                    '<p style="font-size:.72rem;color:var(--texto-sec);margin-top:4px">Comparte tambi\u00e9n el C\u00f3digo familias con los padres. El jugador puede cambiar su PIN desde la app.</p>' +
                    '<button class="btn btn-primary btn-full" style="margin-top:16px" onclick="App.closeModal()">Entendido</button>' +
                    '</div>'
                  );
                }, 50);
              }
              App.state._formIsDirty = false;
              App.state.formJugadorId = null;
              if (volverEquipo) {
                var nuevoJug = res.jugador;
                if (nuevoJug) App.state.formJugadores.push({ID:nuevoJug.ID,Nombre:nuevoJug.Nombre,Apellidos:nuevoJug.Apellidos,Dorsal:nuevoJug.Dorsal,Tipo:'Principal'});
                App.goBack();
              } else {
                var _hIdx = App.state.viewHistory.lastIndexOf('jugadores-admin');
                App.state.viewHistory = _hIdx >= 0 ? App.state.viewHistory.slice(0, _hIdx) : App.state.viewHistory.filter(function(v) { return v !== 'jugador-form' && v !== 'jugador-detalle'; });
                App.views['jugadores-admin'].render();
                App.navigate('jugadores-admin', null, false);
              }
            })
            .catch(function(err) { App.sync.done(); showToast((err && err.message) || 'Error al crear jugador', 'error'); });
        }
      },

      eliminar: function() {
        var jugId = App.state.formJugadorId;
        if (!jugId) return;
        var j = App.state._todosJugadores.find(function(x) { return x.ID === jugId; });
        var nombre = j ? (j.Nombre + ' ' + j.Apellidos) : 'este jugador';
        App.openModal('Eliminar jugador',

            '\u00bfSeguro que quieres eliminar a <strong>' + nombre + '</strong>?',
            'Se eliminar\u00e1n sus asistencias y asignaciones a equipos.',
            "App.views['jugador-form']._confirmarEliminar()"
          )
        );
      },
      _confirmarEliminar: function() {
        var jugId = App.state.formJugadorId;
        App.closeModal();
        // ELIMINACIÓN OPTIMISTA: actualizar cache y navegar de inmediato
        var jBackup = Object.assign({}, App.cache.getJugadorById(jugId));
        var relBackup = App.cache.jugadoresEquipos.filter(function(r) { return r.ID_Jugador === jugId; });
        App.cache.remove('jugadores', jugId);
        App.cache.jugadoresEquipos = App.cache.jugadoresEquipos.filter(function(r) { return r.ID_Jugador !== jugId; });
        App.cache.asistencias = {};
        App.state._todosJugadores = App.cache.jugadores;
        showToast('Jugador eliminado', 'success');
        App.state.formJugadorId = null;
        App.state._formIsDirty = false;
        var _hIdx = App.state.viewHistory.lastIndexOf('jugadores-admin');
        App.state.viewHistory = _hIdx >= 0 ? App.state.viewHistory.slice(0, _hIdx) : App.state.viewHistory.filter(function(v) { return v !== 'jugador-form' && v !== 'jugador-detalle'; });
        App.navigate('jugadores-admin', null, false);
        App.sync.run('eliminarJugador', [jugId], function() {
          if (jBackup && jBackup.ID) App.cache.upsert('jugadores', jBackup);
          relBackup.forEach(function(r) { App.cache.jugadoresEquipos.push(r); });
          App.state._todosJugadores = App.cache.jugadores;
        });
      },
    },

    // -- Lista entrenadores (admin) -------------------------
    'entrenadores-admin': {
      render: function() {
        App.state._todosEntrenadores = App.cache.entrenadores;
        // 5a-1: yo primero, luego el resto en el orden original
        var yoId = App.state.usuario ? App.state.usuario.ID : null;
        var ordenados = App.cache.entrenadores.slice().sort(function(a, b) {
          if (a.ID === yoId) return -1;
          if (b.ID === yoId) return 1;
          return 0;
        });
        App.views['entrenadores-admin']._render(ordenados);
      },
      _render: function(lista) {
        var el = document.getElementById('entrenadores-admin-lista');
        if (!lista.length) {
          el.innerHTML = '<div class="empty-state"><div class="ei">&#x1F3BD;</div><p>Sin entrenadores registrados</p></div>';
          return;
        }
        // 5a-2: calcular stats de asistencia por entrenador
        var statsMap = {};
        App.cache.asistEntrenadores.forEach(function(r) {
          if (!statsMap[r.ID_Entrenador]) statsMap[r.ID_Entrenador] = { total: 0, asistidas: 0 };
          statsMap[r.ID_Entrenador].total++;
          if (r.Asistio === true || r.Asistio === 'TRUE') statsMap[r.ID_Entrenador].asistidas++;
        });
        el.innerHTML = lista.map(function(e) {
          var ini = (e.Nombre ? e.Nombre[0] : '') + (e.Apellidos ? e.Apellidos[0] : '');
          var adminBadge = (e.EsAdmin === true || e.EsAdmin === 'TRUE') ? ' <span class="badge-admin">Admin</span>' : '';
          var isMeBadge = (App.state.usuario && e.ID === App.state.usuario.ID) ? ' <span style="font-size:0.7em; background:#2196F3; color:white; padding:2px 6px; border-radius:10px; margin-left:4px;">(T\u00fa)</span>' : '';
          var st = statsMap[e.ID] || { total: 0, asistidas: 0 };
          var pct = st.total > 0 ? Math.round(st.asistidas / st.total * 100) : null;
          var statsHtml = st.total > 0
            ? '<div class="ent-mini-stats"><div class="ems-val">' + pct + '%</div><div class="ems-lab">' + st.asistidas + '/' + st.total + ' ses.</div></div>'
            : '<div class="ent-mini-stats"><div class="ems-val" style="color:var(--texto-sec)">—</div><div class="ems-lab">sin datos</div></div>';
          return '<div class="list-item" onclick="App.views[\'entrenador-detalle\'].cargar(\'' + e.ID + '\')">' +
            '<div class="li-avatar">' + ini + '</div>' +
            '<div style="flex:1"><div class="li-name">' + e.Apellidos + ', ' + e.Nombre + adminBadge + isMeBadge + '</div>' +
            '<div class="li-sub">' + e.Email + '</div></div>' +
            statsHtml +
            '<div class="li-arrow">&#x203A;</div></div>';
        }).join('');
      },
      filtrar: function(q) {
        var lower = q.toLowerCase();
        App.views['entrenadores-admin']._render(
          App.state._todosEntrenadores.filter(function(e) {
            return String((e.Nombre || '') + ' ' + (e.Apellidos || '') + ' ' + (e.Email || '')).toLowerCase().indexOf(lower) >= 0;
          })
        );
      },
    },

      },
      guardar: function(force) {
        var _n = document.getElementById('ent-nombre');
        if (!_n) { showToast('Error: recarga la página (formulario no encontrado)', 'error'); return; }
        var datos = {
          Nombre:    _n.value.trim(),
          Apellidos: document.getElementById('ent-apellidos').value.trim(),
          Email:     document.getElementById('ent-email').value.trim(),
          Telefono:  document.getElementById('ent-tel').value.trim(),
        };
        var entId = App.state.formEntrenadorId;
        var editandoPropio = App.state.usuario && entId === App.state.usuario.ID;
        // Recoger PIN según modo: credenciales (edición admin/propio) o pin-nuevo (creación)
        if (entId && (App.state.esAdmin || editandoPropio)) {
          // Edición admin o propio: PIN con confirmación
          var _pinEl  = document.getElementById('ent-pin');
          var _pinCEl = document.getElementById('ent-pin-confirm');
          var pinVal  = _pinEl  ? _pinEl.value.trim()  : '';
          var pinVal2 = _pinCEl ? _pinCEl.value.trim() : '';
          if (pinVal || pinVal2) {
            if (pinVal !== pinVal2) { showToast('Los dos PINs no coinciden', 'error'); return; }
            if (!/^[0-9]{4,6}$/.test(pinVal)) { showToast('El PIN debe tener entre 4 y 6 dígitos numéricos', 'error'); return; }
            datos.PIN = pinVal;
          }
        } else if (!entId) {
          // Creación: pin-nuevo opcional
          var _pinNEl = document.getElementById('ent-pin-nuevo');
          if (_pinNEl && _pinNEl.value.trim()) datos.PIN = _pinNEl.value.trim();
        }
        var _esAdminEl = document.getElementById('ent-es-admin');
        if (App.state.esAdmin && _esAdminEl) datos.EsAdmin = _esAdminEl.checked;
        if (!datos.Nombre || !datos.Apellidos) { showToast('Nombre y apellidos son obligatorios', 'error'); return; }
        if (!datos.Email && !entId) { showToast('El email es obligatorio para nuevos entrenadores', 'error'); return; }
        if (datos.Email && !_validarEmail(datos.Email)) { showToast('El email no tiene un formato válido', 'error'); return; }
        if (datos.Telefono && !_validarTel(datos.Telefono)) { showToast('El teléfono no tiene un formato válido (mín. 9 dígitos)', 'error'); return; }
        if (!force) {
          // Detectar email duplicado (al crear o si admin cambia email)
          if (datos.Email) {
            var entOrig = entId ? App.cache.getEntrenadorById(entId) : null;
            var emailCambio = !entOrig || String(entOrig.Email || '').toLowerCase() !== datos.Email.toLowerCase();
            if (emailCambio) {
              var dupEmail = App.cache.entrenadores.find(function(e) { return e.ID !== entId && String(e.Email || '').toLowerCase() === datos.Email.toLowerCase(); });
              if (dupEmail) { showToast('Ya existe un entrenador con ese email', 'error'); return; }
            }
          }
          // Detectar nombre duplicado
          var dup = App.cache.entrenadores.find(function(e) {
            return e.ID !== entId &&
                   String(e.Nombre || '').toLowerCase() === datos.Nombre.toLowerCase() &&
                   String(e.Apellidos || '').toLowerCase() === datos.Apellidos.toLowerCase();
          });
          if (dup) {
            App.openModal('Entrenador duplicado',
              _htmlWarnModal('Ya existe un entrenador llamado <strong>' + datos.Nombre + ' ' + datos.Apellidos + '</strong>.',
                '¿Deseas guardarlo igualmente?', 'Guardar igualmente', "App.closeModal();App.views['entrenador-form'].guardar(true)")
            );
            return;
          }
        }
        if (entId) {
          // EDICIÓN OPTIMISTA: actualizar cache y navegar de inmediato
          var original = Object.assign({}, App.cache.getEntrenadorById(entId));
          App.cache.upsert('entrenadores', Object.assign({ ID: entId }, datos));
          App.state._todosEntrenadores = App.cache.entrenadores;
          App.state._formIsDirty = false;
          App.state.formEntrenadorId = null;
          showToast('Entrenador actualizado', 'success');
          var _hIdx = App.state.viewHistory.lastIndexOf('entrenadores-admin');
          App.state.viewHistory = _hIdx >= 0 ? App.state.viewHistory.slice(0, _hIdx) : App.state.viewHistory.filter(function(v) { return v !== 'entrenador-form' && v !== 'entrenador-detalle'; });
          App.navigate('entrenadores-admin', null, false);
          App.sync.run('actualizarEntrenador', [entId, datos], function() {
            App.cache.upsert('entrenadores', original);
            App.state._todosEntrenadores = App.cache.entrenadores;
          });
        } else {
          // CREACIÓN: esperar ID del servidor, indicador no bloqueante
          App.sync.start();
          server('crearEntrenador', datos)
            .then(function(res) {
              App.sync.done();
              if (!res.success) { showToast(res.error, 'error'); return; }
              if (res.entrenador) App.cache.upsert('entrenadores', res.entrenador);
              App.state._todosEntrenadores = App.cache.entrenadores;
              showToast('Entrenador creado', 'success');
              App.state._formIsDirty = false;
              App.state.formEntrenadorId = null;
              if (App.state._volverAEquipoFormDespues) {
                App.state._volverAEquipoFormDespues = false;
                var nuevoEnt = res.entrenador;
                if (nuevoEnt) App.state.formEntrenadores.push({ID:nuevoEnt.ID,Nombre:nuevoEnt.Nombre,Apellidos:nuevoEnt.Apellidos});
                App.goBack();
              } else {
                var _hIdx = App.state.viewHistory.lastIndexOf('entrenadores-admin');
                App.state.viewHistory = _hIdx >= 0 ? App.state.viewHistory.slice(0, _hIdx) : App.state.viewHistory.filter(function(v) { return v !== 'entrenador-form' && v !== 'entrenador-detalle'; });
                App.navigate('entrenadores-admin', null, false);
              }
            })
            .catch(function(err) { App.sync.done(); showToast((err && err.message) || 'Error al crear entrenador', 'error'); });
        }
      },

      eliminar: function() {
        var entId = App.state.formEntrenadorId;
        if (!entId) return;
        var e = App.state._todosEntrenadores.find(function(x) { return x.ID === entId; });
        var nombre = e ? (e.Nombre + ' ' + e.Apellidos) : 'este entrenador';
        App.openModal('Eliminar entrenador',
          _htmlConfirmModal('danger',
            '\u00bfSeguro que quieres eliminar a <strong>' + nombre + '</strong>?',
            'Se eliminar\u00e1n sus asistencias y asignaciones a equipos.',
            "App.views['entrenador-form']._confirmarEliminar()"
          )
        );
      },
      _confirmarEliminar: function() {
        var entId = App.state.formEntrenadorId;
        App.closeModal();
        // ELIMINACIÓN OPTIMISTA: actualizar cache y navegar de inmediato
        var eBackup = Object.assign({}, App.cache.getEntrenadorById(entId));
        var relBackup = App.cache.entrenadoresEquipos.filter(function(r) { return r.ID_Entrenador === entId; });
        App.cache.remove('entrenadores', entId);
        App.cache.entrenadoresEquipos = App.cache.entrenadoresEquipos.filter(function(r) { return r.ID_Entrenador !== entId; });
        App.cache.asistencias = {};
        App.state._todosEntrenadores = App.cache.entrenadores;
        showToast('Entrenador eliminado', 'success');
        App.state.formEntrenadorId = null;
        App.state._formIsDirty = false;
        var _hIdx = App.state.viewHistory.lastIndexOf('entrenadores-admin');
        App.state.viewHistory = _hIdx >= 0 ? App.state.viewHistory.slice(0, _hIdx) : App.state.viewHistory.filter(function(v) { return v !== 'entrenador-form' && v !== 'entrenador-detalle'; });
        App.navigate('entrenadores-admin', null, false);
        App.sync.run('eliminarEntrenador', [entId], function() {
          if (eBackup && eBackup.ID) App.cache.upsert('entrenadores', eBackup);

          App.state._todosEntrenadores = App.cache.entrenadores;
        });
      },
    },

    // -- Historial completo de equipo ----------------------
    'historial-equipo': {
      render: function() {
        var equipoId = App.state.equipoSesionesId;
        if (!equipoId) return;
        var hoy = _hoy();
        var sesiones = App.cache.getSesionesByEquipo(equipoId);
        var pasadas  = sesiones.filter(function(s) { return s.Fecha < hoy; });

        // Agrupar pasadas por mes YYYY-MM, orden descendente
        var meses = {};
        pasadas.forEach(function(s) {
          var mes = s.Fecha.substring(0, 7);
          if (!meses[mes]) meses[mes] = [];
          meses[mes].push(s);
        });
        var mesesOrdenados = Object.keys(meses).sort(function(a, b) { return a < b ? 1 : -1; });
        var mesesNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

        // Pre-computar stats desde caché para sesiones ya guardadas
        sesiones.forEach(function(s) {
          var guardada = s.AsistenciaGuardada === true || s.AsistenciaGuardada === 'TRUE';
          if (guardada && !s._statsJug) {
            var rs = App.cache.asistJugadores.filter(function(r) { return r.ID_Sesion === s.ID; });
            if (rs.length) {
              s._statsJug = {
                P: rs.filter(function(r) { return r.Estado === 'P'; }).length,
                A: rs.filter(function(r) { return r.Estado === 'A'; }).length,
                R: rs.filter(function(r) { return r.Estado === 'R'; }).length
              };
            }
          }
        });

        function htmlSesion(s) {
          var f = _fmtFecha(s.Fecha);
          var extra = (s.EsExtra === true || s.EsExtra === 'TRUE') ? '<span class="badge-extra">Extra</span>' : '';
          var badgeHtml = '';
          var statsHtml = '';
          var sinRegistrar = '';
          var guardada = s.AsistenciaGuardada === true || s.AsistenciaGuardada === 'TRUE' || s._asistRegistrada;
          if (guardada) {
            badgeHtml = '<span class="sc-status-badge registrada">Registrada</span>';
            if (s._statsJug) {
              statsHtml = '<div class="sc-stats">&#10003;' + s._statsJug.P + ' &middot; &#10007;' + s._statsJug.A +
                (s._statsJug.R ? ' &middot; &#8987;' + s._statsJug.R : '') + '</div>';
            }
          } else if (s.Fecha < hoy) {
            badgeHtml = '<span class="sc-status-badge pendiente">!</span>';
            sinRegistrar = ' sin-registrar';
          }
          return '<div class="sesion-card' + sinRegistrar + '" onclick="App.views.sesiones.abrirSesion(\'' + s.ID + '\')">' +
            '<div class="sc-fecha"><div class="dia">' + f.d + '</div><div class="mes">' + f.m + '</div></div>' +
            '<div class="sc-info" style="flex:1"><div class="dia-n">' + f.dn + '</div>' +
            '<div class="hora">' + s.HoraInicio + '&ndash;' + s.HoraFin + '</div>' +
            statsHtml + '</div>' +
            badgeHtml + extra + '</div>';
        }

        var html = '';
        mesesOrdenados.forEach(function(mes) {
          var partes = mes.split('-');
          var mesNombre = mesesNames[Number(partes[1]) - 1] + ' ' + partes[0];
          html += '<div class="historial-mes-hdr">' + mesNombre + ' (' + meses[mes].length + ')</div>';
          html += meses[mes].slice().reverse().map(htmlSesion).join('');
        });

        if (!html) {
          html = '<div class="empty-state" style="padding:48px 24px"><p>Sin sesiones registradas</p></div>';
        }

        document.getElementById('historial-lista').innerHTML = html;
      },
    },

    'jugador-detalle': {
      cargar: function(id) {
        App.state.detalleJugadorId = id;
        App.navigate('jugador-detalle');
      },
      render: function() {
        var id = App.state.detalleJugadorId;
        if (!id) return;
        var j = App.cache.getJugadorById(id);
        if (!j) return;

        var regs   = App.cache.asistJugadores.filter(function(r) { return r.ID_Jugador === id; });
        var countP = regs.filter(function(r) { return r.Estado === 'P'; }).length;
        var countA = regs.filter(function(r) { return r.Estado === 'A'; }).length;
        var countR = regs.filter(function(r) { return r.Estado === 'R'; }).length;
        var total  = regs.length;
        var pct    = total > 0 ? Math.round(countP / total * 100) : 0;

        // Racha: sesiones consecutivas más recientes con P
        var hist = regs.map(function(r) {
          var s = App.cache.sesiones.find(function(x) { return x.ID === r.ID_Sesion; });
          return s ? { fecha: s.Fecha, estado: r.Estado } : null;
        }).filter(Boolean).sort(function(a, b) { return a.fecha < b.fecha ? 1 : -1; });
        var racha = 0;
        for (var i = 0; i < hist.length; i++) { if (hist[i].estado === 'P') racha++; else break; }

        // Equipos
        var equiposJug = App.cache.jugadoresEquipos
          .filter(function(r) { return r.ID_Jugador === id && (r.Activo === true || r.Activo === 'TRUE'); })
          .map(function(r) { var eq = App.cache.getEquipoById(r.ID_Equipo); return eq ? Object.assign({}, eq, { Tipo: r.Tipo }) : null; })
          .filter(Boolean);

        var ini = (j.Nombre ? j.Nombre[0] : '') + (j.Apellidos ? j.Apellidos[0] : '');
        var html = '<div class="detalle-perfil">' +
          '<div class="detalle-avatar">' + ini + '</div>' +
          '<div><div class="detalle-nombre">' + j.Apellidos + ', ' + j.Nombre + '</div>' +
          '<div class="detalle-sub">Dorsal ' + (j.Dorsal || '-') + '</div>' +
          (j.FechaNac ? '<div class="detalle-meta">Nac. ' + j.FechaNac + '</div>' : '') +
          '</div></div>';

        if (equiposJug.length) {
          html += '<div class="stat-grid-1"><div class="stat-widget">' +
            '<div class="stat-widget-title">Equipos</div>' +
            equiposJug.map(function(eq) {
              return '<span class="detalle-equipo-tag">' + (eq.Tipo === 'Principal' ? '\u2605 ' : '') + eq.Nombre + '</span>';
            }).join('') + '</div></div>';
        }

        html += '<div class="stat-grid-2">' +
          '<div class="stat-widget"><div class="stat-widget-title">Sesiones</div>' +
          '<div class="stat-valor azul">' + total + '</div><div class="stat-label">con registro</div></div>' +
          '<div class="stat-widget"><div class="stat-widget-title">Asistencia</div>' +
          '<div class="stat-valor ' + (pct >= 75 ? 'verde' : pct >= 50 ? 'naranja' : 'rojo') + '">' + pct + '%</div>' +
          '<div class="stat-label">de presencia</div></div></div>';

        if (total > 0) {
          html += '<div class="stat-grid-1"><div class="stat-widget">' +
            '<div class="stat-widget-title">Desglose asistencia</div><div class="bar-wrap">' +
            _htmlBarRow('Presentes', countP, total, '#4CAF50') +
            _htmlBarRow('Ausentes',  countA, total, '#F44336') +
            _htmlBarRow('Retrasos',  countR, total, '#FFC107') +
            '</div></div></div>';
        }

        html += '<div class="stat-grid-2">' +
          '<div class="stat-widget"><div class="stat-widget-title">Racha actual</div>' +
          '<div class="stat-valor ' + (racha >= 5 ? 'verde' : racha >= 2 ? 'azul' : 'naranja') + '">' + racha + '</div>' +
          '<div class="stat-label">seguidas &#10003;</div></div>' +
          '<div class="stat-widget"><div class="stat-widget-title">Ausencias</div>' +
          '<div class="stat-valor ' + (countA === 0 ? 'verde' : countA <= 3 ? 'naranja' : 'rojo') + '">' + countA + '</div>' +
          '<div class="stat-label">faltas totales</div></div></div>';

        html += '<div style="padding-bottom:28px"></div>';
        document.getElementById('jugador-detalle-contenido').innerHTML = html;
      },
    },

    // 3d-11: Ajustes de cuenta (jugador)
    'ajustes-cuenta': {
      render: function() {
        var j = App.state.jugador;
        if (!j) return;
        App.state._formIsDirty = false;
        var uEl = document.getElementById('ajustes-usuario');
        if (uEl) uEl.value = j.Usuario || '';
        var pEl = document.getElementById('ajustes-pin'); if (pEl) pEl.value = '';
        var pcEl = document.getElementById('ajustes-pin-confirm'); if (pcEl) pcEl.value = '';
        // Dirty tracking (4f-6)
        var setDirty = function() { App.state._formIsDirty = true; };
        if (uEl)  uEl.oninput  = setDirty;
        if (pEl)  pEl.oninput  = setDirty;
        if (pcEl) pcEl.oninput = setDirty;
      },
      guardar: function() {
        var nuevoUsuario = (document.getElementById('ajustes-usuario').value || '').trim().toLowerCase();
        var nuevoPin     = (document.getElementById('ajustes-pin').value || '').trim();
        var confirmarPin = (document.getElementById('ajustes-pin-confirm').value || '').trim();
        var j = App.state.jugador;
        if (!j) return;
        if (!nuevoUsuario) { showToast('El usuario no puede estar vac\u00edo', 'error'); return; }
        if (nuevoPin && nuevoPin !== confirmarPin) { showToast('Los PINs no coinciden', 'error'); return; }
        if (nuevoPin && (nuevoPin.length < 4 || !/^\d+$/.test(nuevoPin))) { showToast('El PIN debe tener 4 d\u00edgitos num\u00e9ricos', 'error'); return; }
        confirmarYGuardar(
          'Guardar cambios',
          'Se actualizar\u00e1n tus credenciales de acceso.' +
          '<br><span style="font-size:.8rem;color:var(--texto-sec)">Necesitar\u00e1s el nuevo usuario y/o PIN la pr\u00f3xima vez que accedas.</span>',
          function() {
            App.state._formIsDirty = false;
            // Actualizaci\u00f3n optimista de auth local \u2192 navegar ya
            var authAct = Object.assign({}, App.state.auth, { usuario: nuevoUsuario });
            if (nuevoPin) authAct.pin = nuevoPin;
            App.state.auth = authAct;
            _setStoredAuth(JSON.stringify(authAct));
            j.Usuario = nuevoUsuario;
            App.goBack();
            // Sincronizaci\u00f3n en segundo plano
            App.sync.start();
            server('actualizarCredencialesJugador', j.ID, nuevoUsuario, nuevoPin || null)
              .then(function(res) {
                App.sync.done();
                if (!res.success) showToast(res.error || 'Error al guardar credenciales', 'error');
                else showToast('Credenciales actualizadas', 'success');
              })
              .catch(function(err) {
                App.sync.done();
                showToast((err && err.message) || 'Error de conexi\u00f3n', 'error');
              });
          }
        );
      },
    },

    // 3d-12: Modal de justificación
    justificacion: {
      _sesionId: null,
      _estadoInicial: null,

      abrir: function(sesionId, estado) {
        this._sesionId = sesionId;
        this._estadoInicial = estado;
        var esAusencia = estado !== 'R';
        document.querySelectorAll('#modal-justificacion input[name="justif-tipo"]').forEach(function(inp) {
          inp.checked = esAusencia ? inp.value === 'Ausencia' : inp.value === 'Retraso';
        });
        document.getElementById('justif-hora-wrap').classList.toggle('hidden', esAusencia);
        document.getElementById('justif-detalle').value = '';
        document.getElementById('justif-codigo').value = '';
        var justifTituloEl = document.getElementById('justif-titulo');
        if (justifTituloEl) justifTituloEl.textContent = esAusencia ? 'Justificar ausencia' : 'Justificar retraso';
        // Poblar motivos desde la configuraci\u00f3n
        var select = document.getElementById('justif-motivo');
        select.innerHTML = App.state.motivosJustificacion.length
          ? App.state.motivosJustificacion.map(function(m) {
              return '<option value="' + _esc(m) + '">' + m + '</option>';
            }).join('')
          : '<option value="Motivo personal">Motivo personal</option>';
        App.views.justificacion.actualizarPreview();
        document.getElementById('modal-justificacion').classList.remove('hidden');
      },

      onTipoChange: function(el) {
        var esRetraso = el && el.value === 'Retraso';
        document.getElementById('justif-hora-wrap').classList.toggle('hidden', !esRetraso);
        App.views.justificacion.actualizarPreview();
      },

      actualizarPreview: function() {
        var tipoInput = document.querySelector('#modal-justificacion input[name="justif-tipo"]:checked');
        var tipo = tipoInput ? tipoInput.value : 'Ausencia';
        var motivoEl = document.getElementById('justif-motivo');
        var motivo = motivoEl && motivoEl.value ? motivoEl.value : 'Motivo personal';
        var detalle = document.getElementById('justif-detalle') ? document.getElementById('justif-detalle').value.trim() : '';
        var horaWrap = document.getElementById('justif-hora-wrap');
        var horaEl = document.getElementById('justif-hora');
        var hora = (horaEl && horaWrap && !horaWrap.classList.contains('hidden')) ? horaEl.value : null;
        var j = App.state.jugador;
        if (!j) return;
        var s = App.cache.sesiones.find(function(x) { return x.ID === App.views.justificacion._sesionId; });
        var f = s ? _fmtFecha(s.Fecha) : null;
        var fechaStr = f ? (f.dn + ' ' + f.d + ' de ' + f.ml) : '';
        var preview = j.Nombre + ' ' + j.Apellidos + ' ';
        if (tipo === 'Retraso') {
          preview += 'se incorporar\u00e1 con retraso' + (hora ? ' a las ' + hora : '') + ' el ' + fechaStr + '.';
        } else {
          preview += 'no podr\u00e1 asistir al entrenamiento del ' + fechaStr + '.';
        }
        preview += ' Motivo: ' + motivo + (detalle ? '. ' + detalle : '') + '.';
        var prev = document.getElementById('justif-preview');
        if (prev) prev.textContent = preview;
      },

      enviar: function() {
        var sesionId = this._sesionId;
        var j = App.state.jugador;
        if (!sesionId || !j) return;
        var tipoInput = document.querySelector('#modal-justificacion input[name="justif-tipo"]:checked');
        var tipo = tipoInput ? tipoInput.value : 'Ausencia';
        var motivoEl = document.getElementById('justif-motivo');
        var motivo = motivoEl ? motivoEl.value : '';
        var detalle = document.getElementById('justif-detalle') ? document.getElementById('justif-detalle').value.trim() : '';
        var horaWrap = document.getElementById('justif-hora-wrap');
        var hora = (horaWrap && !horaWrap.classList.contains('hidden')) ? horaWrap.value : null;
        var codigo = document.getElementById('justif-codigo') ? document.getElementById('justif-codigo').value.trim().toUpperCase() : '';
        if (!codigo || codigo.length !== 6) { showToast('Introduce el c\u00f3digo de autorizaci\u00f3n de 6 caracteres', 'error'); return; }
        // Cerrar modal inmediatamente y enviar en segundo plano (no bloqueante)
        App.closeModalJustif();
        App.sync.start();
        var jugadorId = j.ID;
        server('enviarJustificacion', sesionId, jugadorId, codigo, tipo, motivo, detalle, hora || null)
          .then(function(res) {
            App.sync.done();
            if (!res.success) { showToast(res.error || 'Error al enviar', 'error'); return; }
            showToast('Justificaci\u00f3n enviada', 'success');
            // Actualizar cach\u00e9 con el registro devuelto por el servidor
            var reg = App.cache.asistJugadores.find(function(r) { return r.ID_Sesion === sesionId && r.ID_Jugador === jugadorId; });
            if (reg) {
              // Registro exist\u00eda: actualizar en sitio
              reg.TieneJustificacion = true;
              reg.MotivoCategoria = motivo;
              reg.MotivoDetalle = detalle;
            } else if (res.registro) {
              // Sin registro previo: el servidor cre\u00f3 uno nuevo, a\u00f1adirlo al cach\u00e9
              App.cache.asistJugadores.push(res.registro);
            }
            // Re-renderizar vistas afectadas solo si siguen activas
            if (App.state.currentView === 'detalle-sesion-jugador') App.views['detalle-sesion-jugador'].render();
            if (App.state.currentView === 'mis-entrenamientos') App.views['mis-entrenamientos'].render();
          })
          .catch(function(err) {
            App.sync.done();
            showToast((err && err.message) || 'Error de conexi\u00f3n', 'error');
          });
      },
    },

  }, // fin views

}; // fin App

// ================================================================
// App.sync — Módulo de sincronización en segundo plano
// Muestra un indicador no bloqueante mientras hay operaciones activas
// y permite actualizaciones optimistas con rollback en caso de error.
// ================================================================
App.sync = {
  _count: 0,
  start: function() {
    this._count++;
    var el = document.getElementById('sync-badge');
    if (el) el.classList.add('syncing');
  },
  done: function() {
    this._count = Math.max(0, this._count - 1);
    if (!this._count) {
      var el = document.getElementById('sync-badge');
      if (el) el.classList.remove('syncing');
    }
  },
  // Ejecuta una llamada al servidor en segundo plano.
  // Si falla (error de red o res.success===false), llama a rollback() y muestra toast de error.
  run: function(fn, args, rollback) {
    var self = this;
    self.start();
    return server.apply(null, [fn].concat(args || []))
      .then(function(res) {
        self.done();
        if (res && !res.success) {
          if (rollback) rollback();
          showToast(res.error || 'Error al sincronizar', 'error');
        }
        return res;
      })
      .catch(function(err) {
        self.done();
        if (rollback) rollback();
        showToast((err && err.message) || 'Error de conexión', 'error');
      });
  }
};

function _validarEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
}
function _validarTel(tel) {
  var digits = tel.replace(/[\s\-\.\(\)]/g, '');
  return /^\+?[0-9]{9,15}$/.test(digits);
}

function server(fn) {
  var args = [].slice.call(arguments, 1);
  if (fn !== 'iniciarSesion') {
    if (!App.state.auth) {
      App.navigate('login');
      return Promise.reject(new Error('Sesión no iniciada.'));
    }
    args.unshift(App.state.auth);
  }
  return new Promise(function(resolve, reject) {
    var call = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
    call[fn].apply(call, args);
  });
}

function _getStoredAuth() {
  try {
    return localStorage.getItem('cb_baeza_auth');
  } catch (e) {
    return null;
  }
}

function _setStoredAuth(value) {
  try {
    localStorage.setItem('cb_baeza_auth', value);
    return true;
  } catch (e) {
    return false;
  }
}

function _clearStoredAuth() {
  try {
    localStorage.removeItem('cb_baeza_auth');
  } catch (e) {}
}

function _formatDiagError(baseMsg, res, fallbackStage) {
  var msg = baseMsg || 'Error';
  var stage = (res && res.stage) || fallbackStage;
  var trace = res && res.traceId;
  var hoja = res && res.failedSheet;
  if (stage) msg += ' [stage: ' + stage + ']';
  if (hoja) msg += ' [hoja: ' + hoja + ']';
  if (trace) msg += ' [trace: ' + trace + ']';
  return msg;
}

function _clientLog(evento, data) {
  try {
    var call = google.script.run.withFailureHandler(function() {});
    call.logCliente(evento, data || {});
  } catch (e) {}
}

function showLoading(msg) {
  document.getElementById('loading-msg').textContent = msg || 'Cargando...';
  document.getElementById('loading-overlay').classList.remove('hidden');
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.add('hidden');
}

function showToast(msg, type) {
  var c = document.getElementById('toast-container');
  var t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() { t.classList.add('out'); setTimeout(function() { t.remove(); }, 280); }, 3000);
}

function _hoy() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function _fmtFecha(s) {
  if (!s) return {d:'-',m:'-',dn:'-',ml:'-'};
  var parts = s.split('-').map(Number);
  var dt = new Date(parts[0], parts[1]-1, parts[2]);
  var dias = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  var mesesC = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var mesesL = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return {
    d:  String(parts[2]).padStart(2,'0'),
    m:  mesesC[parts[1]-1],
    dn: dias[dt.getDay()],
    ml: mesesL[parts[1]-1],
  };
}

function _diaN(num) {
  return {1:'Lun',2:'Mar',3:'Mie',4:'Jue',5:'Vie',6:'Sab',7:'Dom'}[num] || num;
}

function _iconEstado(e) {
  if (e === 'P') return String.fromCharCode(10003);
  if (e === 'A') return String.fromCharCode(10007);
  if (e === 'R') return String.fromCharCode(8987);
  return '?';
}

function _esc(s) {
  return (s || '').replace(/'/g, "\\'");
}

function _svgPie(cP, cA, cR) {
  var total = cP + cA + cR;
  if (!total) return '<div style="text-align:center;color:var(--texto-sec);font-size:.8rem;padding:12px">Sin datos</div>';
  var sz=120, r=45, cx=60, cy=60;
  var cols=['#4CAF50','#F44336','#FFC107'], vals=[cP,cA,cR], labs=['Presentes','Ausentes','Retrasos'];
  var arcs='', angle=-Math.PI/2;
  vals.forEach(function(v,i) {
    if (!v) return;
    if (v===total) { arcs+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+cols[i]+'"/>'; return; }
    var ea=angle+v/total*2*Math.PI, la=(ea-angle>Math.PI?1:0);
    var x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
    arcs+='<path d="M'+cx+','+cy+' L'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+la+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z" fill="'+cols[i]+'"/>';
    angle=ea;
  });
  var pct=Math.round(cP/total*100);
  arcs+='<circle cx="'+cx+'" cy="'+cy+'" r="26" fill="#fff"/>'+
        '<text x="'+cx+'" y="'+(cy-3)+'" text-anchor="middle" font-size="13" font-weight="800" fill="#1A1A1A">'+pct+'%</text>'+
        '<text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" font-size="7" fill="#6B6B6B">asist.</text>';
  var leg='<div style="display:flex;justify-content:center;gap:14px;margin-top:10px;flex-wrap:wrap">';
  vals.forEach(function(v,i){
    if (!v) return;
    leg+='<div style="display:flex;align-items:center;gap:5px;font-size:.7rem">'+
         '<div style="width:9px;height:9px;border-radius:50%;background:'+cols[i]+'"></div>'+labs[i]+' ('+v+')</div>';
  });
  leg+='</div>';
  return '<div style="display:flex;justify-content:center">'+
         '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'">'+arcs+'</svg></div>'+leg;
}

function _htmlBarRow(name, val, max, color) {
  var pct = max > 0 ? Math.round(val / max * 100) : 0;
  return '<div class="bar-row">'+
    '<div class="bar-label-row"><span class="bar-name">'+name+'</span><span class="bar-val">'+val+'</span></div>'+
    '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div>'+
    '</div>';
}

window.addEventListener('error', function(ev) {
  _clientLog('window_error', {
    message: ev && ev.message ? ev.message : null,
    source: ev && ev.filename ? ev.filename : null,
    line: ev && ev.lineno ? ev.lineno : null,
    col: ev && ev.colno ? ev.colno : null
  });
});

window.addEventListener('unhandledrejection', function(ev) {
  var reason = ev && ev.reason ? ev.reason : null;
  _clientLog('unhandled_rejection', {
    reason: reason && reason.message ? reason.message : String(reason)
  });
});

document.addEventListener('DOMContentLoaded', function() {
  // Estado base seguro: mostrar login mientras se verifica la sesión.
  // Si App.init() navega a otra vista (sesión válida), la sobreescribe.
  try { App.navigate('login'); } catch (e) {}
  try {
    App.init();
  } catch (e) {
    hideLoading();
    _clientLog('dom_content_loaded_error', { error: e && e.message ? e.message : String(e) });
  }
});
